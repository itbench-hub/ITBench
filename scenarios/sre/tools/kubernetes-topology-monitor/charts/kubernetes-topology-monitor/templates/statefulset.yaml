apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: topology-monitor
  namespace: topology-monitor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: topology-monitor
  template:
    metadata:
      annotations:
        openshift.io/required-scc: "restricted-v2"
      labels:
        app: topology-monitor
    spec:
      serviceAccountName: topology-monitor
      # Pod-level security context compliant with the "restricted" Pod Security
      # Standard / OpenShift restricted-v2 SCC. UID/GID/fsGroup are intentionally
      # omitted so OpenShift assigns them from the namespace's allowed range; on
      # plain Kubernetes the container runs as a non-root user from the image.
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: topology-monitor
        image: quay.io/it-bench/topology-monitor:0.0.4
        imagePullPolicy: Always
        command: ["python3.14"]
        args:
        - "main.py"
        - "--data-dir=/app/topology_data"
        - "--interval=300"
        - "--max-snapshots=10"
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          capabilities:
            drop:
              - ALL
          seccompProfile:
            type: RuntimeDefault
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: topology-data
          mountPath: /app/topology_data
        resources:
          requests:
            memory: "256Mi"
            cpu: "1000m"
          limits:
            memory: "768Mi"
            cpu: "1500m"
  persistentVolumeClaimRetentionPolicy:
     whenDeleted: "Delete"
     whenScaled: "Delete"
  volumeClaimTemplates:
  - metadata:
      name: topology-data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 200Mi
