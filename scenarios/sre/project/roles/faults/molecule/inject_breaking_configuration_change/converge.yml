---
- name: Run fault injection test
  hosts:
    - localhost
  tasks:
    - name: Import faults role
      ansible.builtin.import_role:
        name: faults
      vars:
        faults_cluster:
          kubeconfig: "{{ cluster.kubeconfig }}"
        faults_injection_tasks:
          - id: breaking-configuration-change
            args:
container:
  name: server
kubernetesObject:
  apiVersion: apps/v1
  kind: Deployment
  metadata:
    name: test-workload
    namespace: breaking-configuration-change-test
