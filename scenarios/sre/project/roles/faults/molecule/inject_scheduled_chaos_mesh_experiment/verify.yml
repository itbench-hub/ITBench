---
- name: Verify that fault injection succeeded
  hosts:
    - localhost
  tasks:
    - name: Include tools role variables
      ansible.builtin.include_vars:
        file: |-
          {{
            [
              playbook_dir,
              "..",
              "..",
              "..",
              "tools",
              "defaults",
              "main",
              "managers.yaml"
            ] |
            ansible.builtin.path_join
          }}

    - name: Retrieve Schedule
      kubernetes.core.k8s_info:
        kubeconfig: "{{ cluster.kubeconfig }}"
        api_version: chaos-mesh.org/v1alpha1
        kind: Schedule
        name: test-pod-kill-schedule
        namespace: "{{ tools_managers.chaos_mesh.kubernetes.namespace }}"
      register: faults_schedule

    - name: Validate that Schedule exists
      ansible.builtin.assert:
        that:
          - faults_schedule.resources | ansible.builtin.length == 1
        fail_msg: Schedule not found. Fault injection failed.
        success_msg: Schedule found.

    - name: Validate that Schedule has correct spec
      ansible.builtin.assert:
        that:
          - faults_schedule.resources[0].spec.type == "PodChaos"
          - faults_schedule.resources[0].spec.schedule == "* * * * *"
          - faults_schedule.resources[0].spec.concurrencyPolicy == "Forbid"
          - faults_schedule.resources[0].spec.historyLimit == 1
        fail_msg: Schedule spec is incorrect. Fault injection failed.
        success_msg: Schedule spec is correct.

    - name: Validate that Schedule has active experiment
      ansible.builtin.assert:
        that:
          - faults_schedule.resources[0].status.active is defined
          - faults_schedule.resources[0].status.active | ansible.builtin.length >= 1
        fail_msg: Schedule has no active experiments. Fault injection failed.
        success_msg: Schedule has active experiment(s).

    - name: Retrieve active experiment
      kubernetes.core.k8s_info:
        kubeconfig: "{{ cluster.kubeconfig }}"
        api_version: "{{ faults_schedule.resources[0].status.active[0].apiVersion }}"
        kind: "{{ faults_schedule.resources[0].status.active[0].kind }}"
        name: "{{ faults_schedule.resources[0].status.active[0].name }}"
        namespace: "{{ faults_schedule.resources[0].status.active[0].namespace }}"
      register: faults_experiment

    - name: Validate that experiment exists and is injected
      ansible.builtin.assert:
        that:
          - faults_experiment.resources | ansible.builtin.length == 1
          - faults_experiment.resources[0].status.conditions is defined
        fail_msg: Experiment not found or not properly injected. Fault injection failed.
        success_msg: Experiment is active and injected.
