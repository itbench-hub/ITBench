---
- name: Import fault argument validation tasks
  ansible.builtin.import_tasks:
    file: validate_fault_arguments.yaml

- name: Create ConfigMap
  kubernetes.core.k8s:
    kubeconfig: "{{ faults_cluster.kubeconfig }}"
    resource_definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: valkey-storage-script
        namespace: "{{ faults_kubernetes_object.metadata.namespace }}"
      data:
        script: "{{ lookup('ansible.builtin.file', 'files/scripts/valkey_workload_out_of_memory/fill_storage.sh') }}"
    state: present

- name: Update workload containers
  kubernetes.core.k8s:
    kubeconfig: "{{ faults_cluster.kubeconfig }}"
    resource_definition:
      apiVersion: "{{ faults_kubernetes_object.apiVersion }}"
      kind: "{{ faults_kubernetes_object.kind }}"
      metadata:
        name: "{{ faults_kubernetes_object.metadata.name }}"
        namespace: "{{ faults_kubernetes_object.metadata.namespace }}"
      spec:
        template:
          spec:
            containers:
              - name: "{{ faults_container.name }}"
                command:
                  - /bin/sh
                  - -c
                  - "'/data/scripts/fill_storage.sh'"
                volumeMounts:
                  - name: scripts
                    mountPath: /data/scripts
            securityContext:
              fsGroup: 1000
            volumes:
              - name: scripts
                configMap:
                  name: valkey-storage-script
                  defaultMode: "0755"
                  items:
                    - key: script
                      path: fill_storage.sh
    state: patched
