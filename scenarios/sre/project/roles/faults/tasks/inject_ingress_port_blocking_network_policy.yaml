---
- name: Include fault argument validation tasks
  ansible.builtin.include_tasks:
    file: validate_fault_arguments.yaml

- name: Create network policy for workload
  kubernetes.core.k8s:
    kubeconfig: "{{ faults_cluster.kubeconfig }}"
    resource_definition:
      apiVersion: networking.k8s.io/v1
      kind: NetworkPolicy
      metadata:
        name: "{{ faults_kubernetes_object.metadata.name }}-ingress"
        namespace: "{{ faults_kubernetes_object.metadata.namespace }}"
      spec:
        podSelector:
          matchLabels: "{{ faults_kubernetes_object.spec.template.metadata.labels }}"
        policyTypes:
          - Ingress
        ingress:
          - ports: []
    state: present
