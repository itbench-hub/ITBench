---
- name: Include fault argument validation tasks
  ansible.builtin.include_tasks:
    file: validate_fault_arguments.yaml

- name: Include worker node validation tasks
  ansible.builtin.include_tasks:
    file: validate_worker_nodes.yaml

- name: Cordon all worker nodes
  ansible.builtin.command:
    cmd: >-
      kubectl --kubeconfig={{ faults_cluster.kubeconfig }}
      cordon {{ item }}
  loop: "{{ faults_worker_nodes }}"
  loop_control:
    label: "{{ item }}"

- name: Delete target workload pods
  ansible.builtin.command:
    cmd: >-
      kubectl --kubeconfig={{ faults_cluster.kubeconfig }}
      -n {{ faults_kubernetes_object.metadata.namespace }}
      delete pods -l app={{ faults_kubernetes_object.metadata.name }}
      --force --grace-period=0

- name: Wait for pods to be in Pending state
  kubernetes.core.k8s_info:
    kubeconfig: "{{ faults_cluster.kubeconfig }}"
    api_version: v1
    kind: Pod
    namespace: "{{ faults_kubernetes_object.metadata.namespace }}"
    label_selectors:
      - "app={{ faults_kubernetes_object.metadata.name }}"
  register: faults_pending_pods
  until:
    - faults_pending_pods.resources | length > 0
    - >-
      faults_pending_pods.resources |
      selectattr('status.phase', 'equalto', 'Pending') |
      list |
      length > 0
  retries: 15
  delay: 10
