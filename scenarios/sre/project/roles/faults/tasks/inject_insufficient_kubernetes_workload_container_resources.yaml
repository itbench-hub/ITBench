---
- name: Import fault argument validation tasks
  ansible.builtin.import_tasks:
    file: validate_fault_arguments.yaml

- name: Update workload containers
  kubernetes.core.k8s:
    kubeconfig: "{{ faults_cluster.kubeconfig }}"
    resource_definition:
      apiVersion: "{{ faults_kubernetes_object.apiVersion }}"
      kind: "{{ faults_kubernetes_object.kind }}"
      metadata:
        name: "{{ faults_kubernetes_object.metadata.name }}"
        namespace: "{{ faults_kubernetes_object.metadata.namespace }}"
      spec:
        template:
          spec:
            containers:
              - name: "{{ faults_container.name }}"
                resources:
                  limits:
                    cpu: 5m
                    memory: 5Mi
                  requests:
                    cpu: 5m
                    memory: 5Mi
    state: patched
