---
- name: Import documentation role
  ansible.builtin.import_role:
    name: documentation
    tasks_from: load

- name: Create faults `task_files` variable
  ansible.builtin.copy:
    content: "{{ lookup('ansible.builtin.template', 'templates/vars/task_files.j2') }}"
    dest: "{{ [role_path, 'vars', 'main', 'task_files.yaml'] | ansible.builtin.path_join }}"
    mode: "0644"
  vars:
    faults: "{{ documentation_library_index.faults }}"

- name: Create faults roles meta argument specs file
  ansible.builtin.copy:
    content: "{{ lookup('ansible.builtin.template', 'templates/meta/argument_specs.j2') }}"
    dest: "{{ [role_path, 'meta', 'argument_specs.yaml'] | ansible.builtin.path_join }}"
    mode: "0644"
  vars:
    faults: "{{ documentation_library_index.faults }}"

- name: Create fault injection tasks files
  ansible.builtin.copy:
    content: |+
      ---
      - name: Include fault argument validation tasks
        ansible.builtin.include_tasks:
          file: validate_fault_arguments.yaml

      - name: Print message
        ansible.builtin.debug:
          msg: This fault injection ({{ fault.id }}) is unimplemented.
    dest: "{{ [role_path, 'tasks', task_file_name] | ansible.builtin.path_join }}"
    force: false
    mode: "0644"
  loop: "{{ documentation_library_index.faults }}"
  loop_control:
    label: fault/{{ fault.id }}
    loop_var: fault
  vars:
    task_file_name: inject_{{ fault.id | ansible.builtin.replace('-', '_') }}.yaml
