---
- name: Include fault argument validation tasks
  ansible.builtin.include_tasks:
    file: validate_fault_arguments.yaml

- name: Create DaemonSet
  kubernetes.core.k8s:
    kubeconfig: "{{ faults_cluster.kubeconfig }}"
    resource_definition:
      apiVersion: apps/v1
      kind: DaemonSet
      metadata:
        labels:
          "app.kubernetes.io/name": application-operator
        name: application-operator
        namespace: "{{ faults_kubernetes_object.metadata.namespace }}"
      spec:
        selector:
          matchLabels:
            "app.kubernetes.io/name": application-operator
        template:
          metadata:
            labels:
              "app.kubernetes.io/name": application-operator
          spec:
            containers:
              - name: worker
                image: registry.access.redhat.com/ubi10-minimal:10.2-1779862102
                command:
                  - /bin/sh
                args:
                  - -c
                  - "sleep infinity"
    state: present
    wait: true

- name: Update workload containers
  kubernetes.core.k8s:
    kubeconfig: "{{ faults_cluster.kubeconfig }}"
    resource_definition:
      apiVersion: "{{ faults_kubernetes_object.apiVersion }}"
      kind: "{{ faults_kubernetes_object.kind }}"
      metadata:
        name: "{{ faults_kubernetes_object.metadata.name }}"
        namespace: "{{ faults_kubernetes_object.metadata.namespace }}"
      spec:
        template:
          spec:
            affinity:
              podAntiAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  - labelSelector:
                      matchExpressions:
                        - key: app.kubernetes.io/name
                          operator: In
                          values:
                            - application-operator
                    topologyKey: kubernetes.io/hostname
    state: patched
