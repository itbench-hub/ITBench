---
- name: Include fault argument validation tasks
  ansible.builtin.include_tasks:
    file: validate_fault_arguments.yaml

- name: Generate corrupted data for each secret key
  ansible.builtin.set_fact:
    faults_corrupted_data: >-
      {{
        faults_corrupted_data | default({}) |
        ansible.builtin.combine({
          item.key: lookup('ansible.builtin.password', '/dev/null chars=ascii_lowercase,digits length=24') | ansible.builtin.b64encode
        })
      }}
  loop: "{{ faults_kubernetes_object.data | ansible.builtin.dict2items }}"
  loop_control:
    label: "{{ item.key }}"

- name: Corrupt secret data with random values
  kubernetes.core.k8s:
    kubeconfig: "{{ faults_cluster.kubeconfig }}"
    resource_definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: "{{ faults_kubernetes_object.metadata.name }}"
        namespace: "{{ faults_kubernetes_object.metadata.namespace }}"
      data: "{{ faults_corrupted_data }}"
    state: patched

- name: Restart pods that use the secret
  ansible.builtin.command:
    cmd: >-
      kubectl --kubeconfig={{ faults_cluster.kubeconfig }}
      -n {{ faults_kubernetes_object.metadata.namespace }}
      delete pods --all --force --grace-period=0
