---
- name: Include fault argument validation tasks
  ansible.builtin.include_tasks:
    file: validate_fault_arguments.yaml

- name: Corrupt secret data with invalid credentials
  kubernetes.core.k8s:
    kubeconfig: "{{ faults_cluster.kubeconfig }}"
    resource_definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: "{{ faults_kubernetes_object.metadata.name }}"
        namespace: "{{ faults_kubernetes_object.metadata.namespace }}"
      type: Opaque
      data:
        password: "aW52YWxpZC1jcmVkZW50aWFscw=="
        username: "aW52YWxpZC11c2Vy"
        token: "aW52YWxpZC10b2tlbg=="
    state: patched

- name: Restart pods that use the secret
  ansible.builtin.command:
    cmd: >-
      kubectl --kubeconfig={{ faults_cluster.kubeconfig }}
      -n {{ faults_kubernetes_object.metadata.namespace }}
      delete pods --all --force --grace-period=0
