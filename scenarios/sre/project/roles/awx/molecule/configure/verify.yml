---
- name: Verify that AWX was configured successfully
  hosts:
    - localhost
  tasks:
    - name: Import cluster role to set platform and provider variables
      ansible.builtin.import_role:
        name: cluster
      vars:
        cluster_files:
          kubeconfig: "{{ stack.awx.kubeconfig }}"

    - name: Import awx role to set controller host
      ansible.builtin.import_role:
        name: awx
        tasks_from: set_awx_controller_host.yaml
      vars:
        awx_cluster:
          kubeconfig: "{{ stack.awx.kubeconfig }}"
          platform: "{{ cluster_platform }}"
          provider: "{{ cluster_provider }}"

    - name: Import awx role to set controller password
      ansible.builtin.import_role:
        name: awx
        tasks_from: set_awx_controller_password.yaml
      vars:
        awx_cluster:
          kubeconfig: "{{ stack.awx.kubeconfig }}"
          platform: "{{ cluster_platform }}"
          provider: "{{ cluster_provider }}"

    - name: Export AWX configuration
      awx.awx.export:
        controller_host: "{{ awx_controller_host }}"
        controller_password: "{{ awx_controller_password }}" # pragma: allowlist secret
        controller_username: admin
        credential_types:
          - Kubeconfig
        credentials:
          - all
        execution_environments:
          - ITBench-Custom-EE
        inventory:
          - ITBench
        job_templates:
          - Deploy-Tools
          - Undeploy-Tools
          - Deploy-Applications
          - Undeploy-Applications
          - Clear-Kubernetes-Events
          - Inject-Faults
          - Remove-Faults
          - Deploy-Data-Recorders
          - Undeploy-Data-Recorders
          - Grant-Access-To-Agent
          - Remove-Access-From-Agent
          - Check-for-Alerts
          - Pause
          - Handover-To-Agent
          - Handback-From-Agent
          - Run-Agent
        projects:
          - GitHub-ITBench
          - GitHub-LLM-Agent
        organizations:
          - ITBench
        workflow_job_templates:
          - all
      register: awx_export

    - name: Validate that ITBench organization exists
      ansible.builtin.assert:
        that:
          - awx_export.assets.organizations | ansible.builtin.length == 1
        fail_msg: ITBench organization not found. Configuration failed.
        success_msg: ITBench organization found.

    - name: Validate that ITBench execution environment exists
      ansible.builtin.assert:
        that:
          - awx_export.assets.execution_environments | ansible.builtin.length == 1
        fail_msg: ITBench-Custom-EE execution environment not found. Configuration failed.
        success_msg: ITBench-Custom-EE execution environment found.

    - name: Validate that Kubeconfig credential type exists
      ansible.builtin.assert:
        that:
          - awx_export.assets.credential_types | ansible.builtin.length == 1
        fail_msg: Kubeconfig credential type not found. Configuration failed.
        success_msg: Kubeconfig credential type found.

    - name: Validate that credentials were created
      ansible.builtin.assert:
        that:
          - awx_export.assets.credentials | ansible.builtin.length >= 1
        fail_msg: Expected at least 1 credential, found {{ awx_export.assets.credentials | ansible.builtin.length }}. Configuration failed.
        success_msg: Found {{ awx_export.assets.credentials | ansible.builtin.length }} credentials.

    - name: Validate that projects were created
      ansible.builtin.assert:
        that:
          - awx_export.assets.projects | ansible.builtin.length == 2
        fail_msg: GitHub repository projects not found. Configuration failed.
        success_msg: GitHub repository projects found.

    - name: Validate that ITBench inventory exists
      ansible.builtin.assert:
        that:
          - awx_export.assets.inventory | ansible.builtin.length == 1
        fail_msg: ITBench inventory not found in export. Configuration failed.
        success_msg: ITBench inventory found in export.

    - name: Validate that job templates were created
      ansible.builtin.assert:
        that:
          - awx_export.assets.job_templates | ansible.builtin.length == 15
        fail_msg: Job templates not found. Configuration failed.
        success_msg: Job templates found.

    - name: Validate that workflow templates were created
      ansible.builtin.assert:
        that:
          - awx_export.assets.workflow_job_templates | ansible.builtin.length >= 8
        fail_msg: Expected at least 8 workflow templates, found {{ awx_export.assets.workflow_job_templates | ansible.builtin.length }}. Configuration failed.
        success_msg: Found {{ awx_export.assets.workflow_job_templates | ansible.builtin.length }} workflow templates.
