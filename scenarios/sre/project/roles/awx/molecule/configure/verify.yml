---
- name: Verify that AWX was configured successfully
  hosts:
    - localhost
  tasks:
    - name: Import awx role to set controller host
      ansible.builtin.import_role:
        name: awx
        tasks_from: set_awx_controller_host.yaml
      vars:
        awx_cluster:
          kubeconfig: "{{ cluster.kubeconfig }}"

    - name: Import awx role to set controller password
      ansible.builtin.import_role:
        name: awx
        tasks_from: set_awx_controller_password.yaml
      vars:
        awx_cluster:
          kubeconfig: "{{ cluster.kubeconfig }}"

    - name: Export AWX configuration
      awx.awx.export:
        all: true
        controller_host: "{{ awx_controller_host }}"
        controller_password: "{{ awx_controller_password }}"
        controller_username: admin
      register: awx_export

    - name: Parse exported configuration
      ansible.builtin.set_fact:
        awx_config: "{{ awx_export.assets | ansible.builtin.from_yaml }}"

    - name: Validate that ITBench organization exists
      ansible.builtin.assert:
        that:
          - awx_config.organizations | ansible.builtin.selectattr('name', 'equalto', 'ITBench') | ansible.builtin.length == 1
        fail_msg: ITBench organization not found in export. Configuration failed.
        success_msg: ITBench organization found in export.

    - name: Validate that ITBench execution environment exists
      ansible.builtin.assert:
        that:
          - awx_config.execution_environments | ansible.builtin.selectattr('name', 'equalto', 'ITBench-Custom-EE') | ansible.builtin.length == 1
        fail_msg: ITBench-Custom-EE execution environment not found in export. Configuration failed.
        success_msg: ITBench-Custom-EE execution environment found in export.

    - name: Validate that Kubeconfig credential type exists
      ansible.builtin.assert:
        that:
          - awx_config.credential_types | ansible.builtin.selectattr('name', 'equalto', 'Kubeconfig') | ansible.builtin.length == 1
        fail_msg: Kubeconfig credential type not found in export. Configuration failed.
        success_msg: Kubeconfig credential type found in export.

    - name: Validate that credentials were created
      ansible.builtin.assert:
        that:
          - awx_config.credentials | ansible.builtin.length >= 1
        fail_msg: Expected at least 1 credential, found {{ awx_config.credentials | ansible.builtin.length }}. Configuration failed.
        success_msg: Found {{ awx_config.credentials | ansible.builtin.length }} credentials.

    - name: Validate that projects were created
      ansible.builtin.assert:
        that:
          - awx_config.projects | ansible.builtin.length >= 2
          - awx_config.projects | ansible.builtin.selectattr('name', 'equalto', 'GitHub-ITBench') | ansible.builtin.length == 1
          - awx_config.projects | ansible.builtin.selectattr('name', 'equalto', 'GitHub-LLM-Agent') | ansible.builtin.length == 1
        fail_msg: Expected at least 2 projects including GitHub-ITBench and GitHub-LLM-Agent. Configuration failed.
        success_msg: Found {{ awx_config.projects | ansible.builtin.length }} projects including required projects.

    - name: Validate that ITBench inventory exists
      ansible.builtin.assert:
        that:
          - awx_config.inventories | ansible.builtin.selectattr('name', 'equalto', 'ITBench') | ansible.builtin.length == 1
        fail_msg: ITBench inventory not found in export. Configuration failed.
        success_msg: ITBench inventory found in export.

    - name: Validate that job templates were created
      ansible.builtin.assert:
        that:
          - awx_config.job_templates | ansible.builtin.length >= 13
          - awx_config.job_templates | ansible.builtin.selectattr('name', 'equalto', 'Deploy-Tools') | ansible.builtin.length == 1
          - awx_config.job_templates | ansible.builtin.selectattr('name', 'equalto', 'Run-Agent') | ansible.builtin.length == 1
        fail_msg: Expected at least 13 job templates including Deploy-Tools and Run-Agent. Configuration failed.
        success_msg: Found {{ awx_config.job_templates | ansible.builtin.length }} job templates including required templates.

    - name: Validate that workflow templates were created
      ansible.builtin.assert:
        that:
          - awx_config.workflow_job_templates | ansible.builtin.length >= 8
        fail_msg: Expected at least 8 workflow templates, found {{ awx_config.workflow_job_templates | ansible.builtin.length }}. Configuration failed.
        success_msg: Found {{ awx_config.workflow_job_templates | ansible.builtin.length }} workflow templates.

    - name: Validate workflow template naming convention
      ansible.builtin.assert:
        that:
          - awx_config.workflow_job_templates | ansible.builtin.selectattr('name', 'match', '^Scenario-[0-9]+-.*') | ansible.builtin.length >= 4
          - awx_config.workflow_job_templates | ansible.builtin.selectattr('name', 'match', '^Cluster-[0-9]+-.*') | ansible.builtin.length >= 4
        fail_msg: Workflow templates do not follow expected naming convention. Configuration failed.
        success_msg: Workflow templates follow expected naming convention.
