---
- name: Create kubeconfig credential type
  awx.awx.credential_type:
    controller_host: "{{ awx_controller_host }}"
    controller_password: "{{ awx_controller_password }}" # pragma: allowlist secret
    controller_username: admin
    description: Credentials type for Kubeconfig
    inputs:
      fields:
        - id: kubeconfig
          type: string
          label: kubeconfig
          secret: true
          multiline: true
      required:
        - kubeconfig
    injectors: "{{ lookup('ansible.builtin.file', 'files/awx/credential_types/kubeconfig_injectors.json') }}"
    kind: cloud
    name: Kubeconfig
    state: present

- name: Create kubeconfig credentials for each runner
  awx.awx.credential:
    controller_host: "{{ awx_controller_host }}"
    controller_password: "{{ awx_controller_password }}" # pragma: allowlist secret
    controller_username: admin
    credential_type: Kubeconfig
    description: Kubeconfig file for a Kubernetes cluster
    inputs:
      kubeconfig: "{{ lookup('ansible.builtin.file', kubeconfig) }}"
    name: Cluster-{{ kubeconfig_index + 1 }}-Kubeconfig
    organization: ITBench
  loop: "{{ awx_experiments.runners.kubeconfigs }}"
  loop_control:
    index_var: kubeconfig_index
    label: kubeconfig/{{ kubeconfig | ansible.builtin.basename }}
    loop_var: kubeconfig

- name: Create credentials for AWS Cloud Provider
  when:
    - awx_configuration.providers.aws.enabled | ansible.builtin.default(false)
  block:
    - name: Retrieve AWS access key id
      ansible.builtin.command:
        argv:
          - aws
          - configure
          - get
          - aws_access_key_id
      register: awx_aws_access_key_id_output
      changed_when:
        - false

    - name: Retrieve AWS secret access key
      ansible.builtin.command:
        argv:
          - aws
          - configure
          - get
          - aws_secret_access_key
      register: awx_aws_secret_access_key_output
      changed_when:
        - false

    - name: Create credentials for AWS
      awx.awx.credential:
        controller_host: "{{ awx_controller_host }}"
        controller_password: "{{ awx_controller_password }}" # pragma: allowlist secret
        controller_username: admin
        credential_type: Amazon Web Services
        description: Credentials for AWS
        inputs:
          username: "{{ awx_aws_access_key_id_output.stdout }}"
          password: "{{ awx_aws_secret_access_key_output.stdout }}" # pragma: allowlist secret
        name: AWS
        organization: ITBench
        state: present

- name: Create credentials for Datadog observability vendor
  when:
    - awx_configuration.vendors.datadog is ansible.builtin.defined
  vars:
    awx_datadog_enabled: "{{ awx_configuration.vendors.datadog.enabled | ansible.builtin.default(false) }}"
  block:
    - name: Create Datadog credential type
      awx.awx.credential_type:
        controller_host: "{{ awx_controller_host }}"
        controller_password: "{{ awx_controller_password }}" # pragma: allowlist secret
        controller_username: admin
        description: Credentials type for the Datadog observability vendor
        inputs:
          fields:
            - id: manifest
              type: string
              label: DatadogAgent manifest (datadog-agent.yaml)
              secret: true
              multiline: true
            - id: api_key
              type: string
              label: Datadog API key
              secret: true
            - id: app_key
              type: string
              label: Datadog application key
              secret: true
          required:
            - manifest
            - api_key
        injectors: "{{ lookup('ansible.builtin.file', 'files/awx/credential_types/datadog_injectors.json') }}"
        kind: cloud
        name: Datadog
        state: present
      when:
        - awx_datadog_enabled

    # Reconcile the credential INSTANCE to match the enabled flag: present when
    # enabled, absent when disabled (so disabling a vendor removes its stored
    # credential rather than leaving it selectable).
    - name: Reconcile Datadog credential
      awx.awx.credential:
        controller_host: "{{ awx_controller_host }}"
        controller_password: "{{ awx_controller_password }}" # pragma: allowlist secret
        controller_username: admin
        credential_type: Datadog
        description: Datadog agent manifest and API/application keys
        inputs: "{{ awx_datadog_inputs if awx_datadog_enabled else omit }}"
        name: Datadog
        organization: ITBench
        state: "{{ 'present' if awx_datadog_enabled else 'absent' }}"
      vars:
        awx_datadog_inputs:
          manifest: "{{ awx_configuration.vendors.datadog.manifest | ansible.builtin.default('') }}"
          api_key: "{{ awx_configuration.vendors.datadog.api_key | ansible.builtin.default('') }}" # pragma: allowlist secret
          app_key: "{{ awx_configuration.vendors.datadog.app_key | ansible.builtin.default('') }}" # pragma: allowlist secret
      no_log: true

- name: Create credentials for Dynatrace observability vendor
  when:
    - awx_configuration.vendors.dynatrace is ansible.builtin.defined
  vars:
    awx_dynatrace_enabled: "{{ awx_configuration.vendors.dynatrace.enabled | ansible.builtin.default(false) }}"
  block:
    - name: Create Dynatrace credential type
      awx.awx.credential_type:
        controller_host: "{{ awx_controller_host }}"
        controller_password: "{{ awx_controller_password }}" # pragma: allowlist secret
        controller_username: admin
        description: Credentials type for the Dynatrace observability vendor
        inputs:
          fields:
            - id: dynakube
              type: string
              label: DynaKube manifest (dynakube.yaml)
              secret: true
              multiline: true
          required:
            - dynakube
        injectors: "{{ lookup('ansible.builtin.file', 'files/awx/credential_types/dynatrace_injectors.json') }}"
        kind: cloud
        name: Dynatrace
        state: present
      when:
        - awx_dynatrace_enabled

    - name: Reconcile Dynatrace credential
      awx.awx.credential:
        controller_host: "{{ awx_controller_host }}"
        controller_password: "{{ awx_controller_password }}" # pragma: allowlist secret
        controller_username: admin
        credential_type: Dynatrace
        description: Dynatrace DynaKube manifest (contains Secret and DynaKube CR)
        inputs: "{{ awx_dynatrace_inputs if awx_dynatrace_enabled else omit }}"
        name: Dynatrace
        organization: ITBench
        state: "{{ 'present' if awx_dynatrace_enabled else 'absent' }}"
      vars:
        awx_dynatrace_inputs:
          dynakube: "{{ awx_configuration.vendors.dynatrace.dynakube | ansible.builtin.default('') }}" # pragma: allowlist secret
      no_log: true

- name: Create credentials for GitHub repositories
  awx.awx.credential:
    controller_host: "{{ awx_controller_host }}"
    controller_password: "{{ awx_controller_password }}" # pragma: allowlist secret
    controller_username: admin
    credential_type: Source Control
    description: "SSH Credentials for {{ repository.description }}"
    inputs:
      ssh_key_data: "{{ lookup('ansible.builtin.file', repository.configuration.ssh.private_key_path) }}"
      ssh_key_unlock: "{{ repository.configuration.ssh.private_key_passphrase }}"
    name: "{{ repository.name }}"
    organization: ITBench
    state: present
  loop:
    - name: GitHub-ITBench
      description: ITBench GitHub repository
      configuration: "{{ awx_configuration.github.itbench }}"
      is_required: "{{ awx_configuration.github.itbench.ssh is ansible.builtin.defined }}"
    - name: GitHub-LLM-Agent
      description: LLM agent repository
      configuration: "{{ awx_configuration.github.agent }}"
      is_required: "{{ awx_configuration.github.agent.ssh is ansible.builtin.defined }}"
  loop_control:
    label: credential/{{ repository.name }}
    loop_var: repository
  when:
    - repository.is_required
