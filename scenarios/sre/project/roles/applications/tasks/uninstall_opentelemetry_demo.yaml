---
- name: Uninstall OpenTelemetry Demo (Astronomy Shop)
  kubernetes.core.helm:
    kubeconfig: "{{ applications_cluster.kubeconfig }}"
    release_name: "{{ applications_managers.opentelemetry_demo.helm.release.name }}"
    release_namespace: "{{ applications_managers.opentelemetry_demo.kubernetes.namespace }}"
    release_state: absent
    wait: true

- name: Delete Namespace
  kubernetes.core.k8s:
    kubeconfig: "{{ applications_cluster.kubeconfig }}"
    resource_definition:
      api_version: v1
      kind: Namespace
      metadata:
        name: "{{ applications_managers.opentelemetry_demo.kubernetes.namespace }}"
    state: absent
    wait: true

# The custom SCC is cluster-scoped, so namespace deletion does not remove it.
- name: Delete custom SecurityContextConstraint for OpenTelemetry Demo
  kubernetes.core.k8s:
    kubeconfig: "{{ applications_cluster.kubeconfig }}"
    api_version: security.openshift.io/v1
    kind: SecurityContextConstraints
    name: it-bench-otel-demo-anyuid-seccomp
    state: absent
    wait: true
  when:
    - applications_cluster.platform == "openshift"
