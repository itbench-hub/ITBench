---
# Creates the Datadog api/app-key Secret referenced by the DatadogAgent CR.
# Secret values are source-agnostic: an extra variable (e.g. injected by AWX)
# takes precedence, falling back to an environment variable for local runs.
- name: Read Datadog secrets from environment or extra variables
  ansible.builtin.set_fact:
    tools_datadog_api_key: "{{ datadog_api_key | ansible.builtin.default(lookup('ansible.builtin.env', 'DATADOG_API_KEY'), true) }}" # pragma: allowlist secret
    tools_datadog_app_key: "{{ datadog_app_key | ansible.builtin.default(lookup('ansible.builtin.env', 'DATADOG_APP_KEY'), true) }}" # pragma: allowlist secret
  no_log: true

- name: Verify that the Datadog API key is provided
  ansible.builtin.assert:
    that:
      - tools_datadog_api_key | ansible.builtin.default('') | ansible.builtin.length > 0
    fail_msg: The Datadog API key must be provided via the DATADOG_API_KEY environment variable or the datadog_api_key extra variable before installing the Datadog agent.
    success_msg: Datadog API key found.
  no_log: true

- name: Verify that an application key is provided when the manifest requires it
  ansible.builtin.assert:
    that:
      - tools_datadog_app_key | ansible.builtin.default('') | ansible.builtin.length > 0
    fail_msg: >-
      The DatadogAgent manifest references an application key
      (spec.global.credentials.appSecret) but no application key was provided.
      Set DATADOG_APP_KEY or the datadog_app_key extra variable.
    success_msg: Datadog application key found.
  when:
    - tools_datadog_requires_app_key | ansible.builtin.default(false)
  no_log: true

- name: Build Datadog secret data
  ansible.builtin.set_fact:
    tools_datadog_secret_data: >-
      {{
        {(tools_datadog_config.api_key_name | ansible.builtin.default('api-key')): tools_datadog_api_key}
        | ansible.builtin.combine(
            {(tools_datadog_config.app_key_name | ansible.builtin.default('app-key')): tools_datadog_app_key}
            if (tools_datadog_app_key | ansible.builtin.default('') | ansible.builtin.length > 0)
            else {}
          )
      }}
  no_log: true

- name: Create Datadog credentials secret
  kubernetes.core.k8s:
    kubeconfig: "{{ tools_cluster.kubeconfig }}"
    resource_definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: "{{ tools_datadog_secret_name }}"
        namespace: "{{ tools_datadog_namespace }}"
        labels:
          app.kubernetes.io/managed-by: ITBench
          itbench.io/observability-vendor: datadog
      type: Opaque
      stringData: "{{ tools_datadog_secret_data }}" # pragma: allowlist secret
    state: present
  no_log: true
