---
- name: Uninstall recorders
  hosts:
    - environment
  tasks:
    - name: Create temporary directory
      ansible.builtin.file:
        mode: "0755"
        path: "{{ [playbook_dir, 'test'] | ansible.builtin.path_join }}"
        state: directory

    - name: Import cluster role
      ansible.builtin.import_role:
        name: cluster
      vars:
        cluster_files:
          kubeconfig: "{{ cluster.kubeconfig }}"

    - name: Import recorders role
      ansible.builtin.import_role:
        name: recorders
        tasks_from: uninstall.yaml
      vars:
        recorders_cluster:
          kubeconfig: "{{ cluster.kubeconfig }}"
          platform: "{{ cluster_platform }}"
        recorders_storage:
          local:
            directory: "{{ [playbook_dir, 'test'] | ansible.builtin.path_join }}"

    - name: Delete temporary directory
      ansible.builtin.file:
        path: "{{ [playbook_dir, 'test'] | ansible.builtin.path_join }}"
        state: absent
