---
- name: Include wait tasks
  ansible.builtin.include_tasks:
    file: "{{ waiters_task_files[wait_task.id].wait }}"
    apply:
      tags:
        - inject_faults
      vars:
        waiter_args: "{{ wait_task.args }}"
  loop: "{{ waiters_tasks }}"
  loop_control:
    label: task/{{ wait_task.id }}
    loop_var: wait_task
  tags:
    - inject_faults
