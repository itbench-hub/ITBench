---
apiVersion: itbench.io/v2
kind: GroundTruth
metadata:
  name: scenario-116
spec:
  alerts:
    - labels: {}
      name: KubePodNotReady
  entities:
    - apiVersion: apps/v1
      kind: StatefulSet
      metadata:
        name: etcd
        namespace: otel-demo
  solutions:
    - - steps:
          - text: Compact and defragment the etcd database to reclaim storage space.
          - text: Remove unnecessary resources (completed jobs, orphaned ConfigMaps) to reduce etcd storage usage.
      - steps:
          - text: Increase the etcd storage quota if the current limit is too low for the cluster workload.
