---
apiVersion: itbench.io/v2
kind: Scenario
metadata:
  name: scenario-35
spec:
  applications:
    opentelemetryDemo:
      enabled: true
  faults:
    - injections:
        - args:
            kubernetesObject:
              apiVersion: chaos-mesh.org/v1alpha1
              kind: Schedule
              metadata:
                name: ad-jvm-chaos
                namespace: chaos-mesh
            scheduleSpec:
              jvmChaos:
                action: stress
                memType: heap
                mode: all
                selector:
                  labelSelectors:
                    app.kubernetes.io/component: ad
                  namespaces:
                    - otel-demo
              type: JVMChaos
          id: scheduled-chaos-mesh-experiment
  tools:
    sre:
      enabled: true
