---
alerts:
  - group_id: checkout-service-1
    id: NoRequestsReceived
    metadata:
      description: Checkout service in CrashLoopBackOff due to nil pointer panic when attempting to publish to misconfigured Kafka, resulting in no successful
        requests processed
  - group_id: checkout-pod-1
    id: KubePodCrashLooping
    metadata:
      description: Checkout pod crash-looping due to Kafka connection failure with misconfigured port
  - group_id: frontend-service-1
    id: HighRequestErrorRate
    metadata:
      description: Frontend experiencing errors when calling crash-looping checkout service
  - group_id: frontend-proxy-service-1
    id: HighRequestErrorRate
    metadata:
      description: Frontend proxy experiencing errors cascading from frontend
  - group_id: fraud-detection-service-1
    id: NoRequestsReceived
    metadata:
      description: Fraud detection receiving no requests due to checkout service unavailability
  - group_id: accounting-service-1
    id: NoRequestsReceived
    metadata:
      description: Accounting receiving no requests due to checkout service unavailability
  - group_id: accounting-service-1
    id: NoDatabaseOperations
    metadata:
      description: Accounting has no database operations due to receiving no order events
aliases:
  - - checkout-service-1
    - checkout-pod-1
fault:
  - category: Configuration
    condition: Checkout deployment has misconfigured KAFKA_ADDR environment variable pointing to wrong port 9999
    entity:
      group_id: checkout-deployment
      kind: Deployment
      name: checkout-deployment
    fault_mechanism: environment_variable_misconfiguration
groups:
  - filter:
      - checkout\b
    id: checkout-deployment
    kind: Deployment
    namespace: otel-demo
    root_cause: true
  - filter:
      - checkout-.*
    id: checkout-pod-1
    kind: Pod
    namespace: otel-demo
  - filter:
      - checkout\b
    id: checkout-service-1
    kind: Service
    namespace: otel-demo
  - filter:
      - kafka\b
    id: kafka-service-1
    kind: Service
    namespace: otel-demo
  - filter:
      - frontend\b
    id: frontend-service-1
    kind: Service
    namespace: otel-demo
  - filter:
      - frontend-proxy\b
    id: frontend-proxy-service-1
    kind: Service
    namespace: otel-demo
  - filter:
      - fraud-detection\b
    id: fraud-detection-service-1
    kind: Service
    namespace: otel-demo
  - filter:
      - accounting\b
    id: accounting-service-1
    kind: Service
    namespace: otel-demo
metadata:
  version: v1
propagations:
  - condition: Deployment configuration specifies incorrect Kafka port 9999 instead of correct port 9092
    effect: Checkout pods start with misconfigured Kafka client that cannot connect to Kafka, causing crash loops
    source: checkout-deployment
    target: checkout-pod-1
  - condition: Checkout application has nil Kafka client due to connection failure, causing nil pointer panic when processing orders
    effect: Checkout service crashes repeatedly (CrashLoopBackOff with 43+ restarts), unable to process any requests successfully
    source: checkout-pod-1
    target: checkout-service-1
  - condition: Frontend calls crash-looping checkout service
    effect: Frontend receives connection errors and timeouts, resulting in high error rates
    source: checkout-service-1
    target: frontend-service-1
  - condition: Frontend returns errors to proxy
    effect: Frontend proxy propagates errors to users
    source: frontend-service-1
    target: frontend-proxy-service-1
  - condition: Checkout service unavailable and cannot forward order events to Kafka
    effect: Fraud detection receives no order events to process
    source: checkout-service-1
    target: fraud-detection-service-1
  - condition: Checkout service unavailable and cannot forward order events to Kafka
    effect: Accounting receives no order events, performs no database operations
    source: checkout-service-1
    target: accounting-service-1
recommended_actions:
  - solution:
      actions:
        - Correct KAFKA_ADDR environment variable in checkout deployment to use the correct Kafka port
      id: fix_kafka_environment_variable
