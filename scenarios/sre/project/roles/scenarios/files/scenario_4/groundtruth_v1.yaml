---
alerts:
  - group_id: product-catalog-service-1
    id: HighRequestErrorRate
    metadata:
      description: Request error rate in service product-catalog in namespace otel-demo is above 0
  - group_id: checkout-service-1
    id: HighRequestErrorRate
    metadata:
      description: Request error rate in service checkout in namespace otel-demo is above 0
  - group_id: frontend-service-1
    id: HighRequestErrorRate
    metadata:
      description: Request error rate in service frontend in namespace otel-demo is above 0
  - group_id: frontend-proxy-service-1
    id: HighRequestErrorRate
    metadata:
      description: Request error rate in service frontend-proxy in namespace otel-demo is above 0
aliases:
  - - flagd-pod-1
    - flagd-service-1
  - - product-catalog-service-1
    - product-catalog-pod-1
  - - checkout-service-1
    - checkout-pod-1
  - - frontend-service-1
    - frontend-pod-1
  - - frontend-proxy-service-1
    - frontend-proxy-pod-1
fault:
  - category: Configuration Setting
    condition: productCatalogFailure feature flag enabled
    entity:
      changed:
        element: data.demo\.flagd\.json
        from: '"productCatalogFailure": { "defaultVariant": "off" }'
        to: '"productCatalogFailure": { "defaultVariant": "on" }'
      kind: ConfigMap
      name: flagd-config
    fault_mechanism: custom(flagd)
groups:
  - filter:
      - flagd-config\b
    id: flagd-config-1
    kind: ConfigMap
    namespace: otel-demo
    root_cause: true
  - filter:
      - flagd-.*
    id: flagd-pod-1
    kind: Pod
    namespace: otel-demo
  - filter:
      - flagd\b
    id: flagd-service-1
    kind: Service
    namespace: otel-demo
  - filter:
      - product-catalog\b
    id: product-catalog-service-1
    kind: Service
    namespace: otel-demo
  - filter:
      - product-catalog-.*
    id: product-catalog-pod-1
    kind: Pod
    namespace: otel-demo
  - filter:
      - checkout\b
    id: checkout-service-1
    kind: Service
    namespace: otel-demo
  - filter:
      - checkout-.*
    id: checkout-pod-1
    kind: Pod
    namespace: otel-demo
  - filter:
      - frontend\b
    id: frontend-service-1
    kind: Service
    namespace: otel-demo
  - filter:
      - frontend-.*
    id: frontend-pod-1
    kind: Pod
    namespace: otel-demo
  - filter:
      - frontend-proxy\b
    id: frontend-proxy-service-1
    kind: Service
    namespace: otel-demo
  - filter:
      - frontend-proxy-.*
    id: frontend-proxy-pod-1
    kind: Pod
    namespace: otel-demo
metadata:
  version: v1
propagations:
  - condition: flagd-config ConfigMap productCatalogFailure feature flag enabled
    effect: flagd enables product catalog failure injection
    source: flagd-config-1
    target: flagd-service-1
  - condition: flagd enables product catalog failure injection
    effect: product-catalog service returns errors for specific product requests
    source: flagd-service-1
    target: product-catalog-service-1
  - condition: checkout service receives errors when retrieving product information
    effect: checkout service experiences errors during product validation
    source: product-catalog-service-1
    target: checkout-service-1
  - condition: frontend receives errors from checkout service due to product catalog failures
    effect: frontend service experiences errors during checkout operations
    source: checkout-service-1
    target: frontend-service-1
  - condition: frontend-proxy receives errors from frontend service due to checkout failures
    effect: frontend-proxy service experiences errors when proxying requests
    source: frontend-service-1
    target: frontend-proxy-service-1
recommended_actions:
  - solution:
      actions:
        - Disable productCatalogFailure feature flag in flagd configuration
      id: disable_productCatalogFailure_feature_flag
