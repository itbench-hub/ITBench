---
alerts:
  - group_id: payment-service-1
    id: HighRequestErrorRate
    metadata:
      description: Payment service unavailable due to feature flag
  - group_id: checkout-service-1
    id: HighRequestErrorRate
    metadata:
      description: Checkout service unable to reach payment service
  - group_id: frontend-service-1
    id: HighRequestErrorRate
    metadata:
      description: Frontend service experiencing errors during checkout operations
  - group_id: frontend-proxy-service-1
    id: HighRequestErrorRate
    metadata:
      description: Frontend proxy experiencing errors from failed checkout attempts
fault:
  - category: Resource Unavailable
    condition: High error rate
    entity:
      kind: Service
      name: otel-demo-emailservice
    fault_mechanism: custom(flagd)
  - category: Resource Unavailable
    condition: High error rate
    entity:
      kind: Service
      name: checkout
    fault_mechanism: custom(flagd)
  - category: Configuration Setting
    condition: paymentUnreachable feature flag set
    entity:
      changed:
        element: data.demo\.flagd\.json
        from: "{\n  \"$schema\": \"https://flagd.dev/schema/v0/flags.json\",\n  \"flags\": {\n    \"productCatalogFailure\": {\n      \"description\": \"Fail product
          catalog service on a specific product\",\n      \"state\": \"ENABLED\",\n      \"variants\": {\n        \"on\": true,\n        \"off\": false\n      },\n\
          \      \"defaultVariant\": \"off\"\n    },\n    \"recommendationCacheFailure\": {\n      \"description\": \"Fail recommendation service cache\",\n     \
