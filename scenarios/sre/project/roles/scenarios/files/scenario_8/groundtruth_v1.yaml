          paymentUnreachable\": {\n      \"description\": \"Payment service is unavailable\",\n      \"state\": \"ENABLED\",\n      \"variants\": {\n        \"on\"\
          : true,\n        \"off\": false\n      },\n      \"defaultVariant\": \"on\"\n    },\n    \"loadgeneratorFloodHomepage\": {\n      \"description\": \"Flood
          the frontend with a large amount of requests.\",\n      \"state\": \"ENABLED\",\n      \"variants\": {\n        \"on\": 100,\n        \"off\": 0\n     \
          \ },\n      \"defaultVariant\": \"off\"\n    },\n    \"imageSlowLoad\": {\n      \"description\": \"slow loading images in the frontend\",\n      \"state\"\
          : \"ENABLED\",\n      \"variants\": {\n        \"10sec\": 10000,\n        \"5sec\": 5000,\n        \"off\": 0\n      },\n      \"defaultVariant\": \"off\"\
          \n    }\n  }\n}\n"
      kind: ConfigMap
      name: flagd-config
    fault_mechanism: custom(flagd)
groups:
  - id: flagd-config
    kind: ConfigMap
    name: flagd-config
    namespace: otel-demo
    root_cause: true
  - filter:
      - payment\b
    id: payment-service-1
    kind: Service
    namespace: otel-demo
  - filter:
      - checkout\b
    id: checkout-service-1
    kind: Service
    namespace: otel-demo
  - filter:
      - frontend\b
    id: frontend-service-1
    kind: Service
    namespace: otel-demo
  - filter:
      - frontend-proxy\b
    id: frontend-proxy-service-1
    kind: Service
    namespace: otel-demo
metadata:
  version: v1
propagations:
  - condition: Feature flag makes payment service completely unavailable
    effect: Payment service cannot be reached by any callers
    source: flagd-config
    target: payment-service-1
  - condition: Checkout service cannot connect to payment service at all
    effect: Checkout operations fail when attempting to process payments due to service unavailability
    source: payment-service-1
    target: checkout-service-1
  - condition: Frontend receives errors from checkout when payment service is unreachable
    effect: Users cannot complete purchases, checkout flow fails
    source: checkout-service-1
    target: frontend-service-1
  - condition: Frontend returns error responses to proxy for failed checkout attempts
    effect: Users experience complete checkout failure through the proxy
    source: frontend-service-1
    target: frontend-proxy-service-1
recommended_actions:
  - solution:
      actions:
        - Disable paymentUnreachable flag
      id: Disable paymentUnreachable flag
