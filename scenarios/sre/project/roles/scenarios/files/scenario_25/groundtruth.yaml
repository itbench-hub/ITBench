---
apiVersion: itbench.io/v2
kind: GroundTruth
metadata:
  name: scenario-25
spec:
  alerts: []
  entities:
    - apiVersion: chaos-mesh.org/v1alpha1
      kind: Schedule
      metadata:
        name: recommendation-cpu-stress
        namespace: chaos-mesh
  solutions:
    - - steps:
          - command: kubectl -n chaos-mesh annotate schedule recommendation-cpu-stress experiment.chaos-mesh.org/pause='true'
            text: Annotate the schedule to pause the active experiment.
          - command: kubectl -n chaos-mesh get stresschaos --selector='experiment.chaos-mesh.org/pause=true'
            text: Retrieve the associated experiment managed by the schedule.
          - text: Delete the retrieved experiement after it has entered the `Paused` state.
          - command: kubectl -n chaos-mesh delete schedule recommendation-cpu-stress experiment.chaos-mesh.org/pause='true'
            text: Delete the schedule.
