---
alerts:
  - group_id: payment-service-1
    id: HighRequestErrorRate
    metadata:
      description: Payment service unavailable and charge requests failing due to combined feature flags
  - group_id: checkout-service-1
    id: HighRequestErrorRate
    metadata:
      description: Checkout service unable to reach payment service and experiencing charge failures
  - group_id: frontend-service-1
    id: HighRequestErrorRate
    metadata:
      description: Frontend service experiencing errors during checkout operations
  - group_id: frontend-proxy-service-1
    id: HighRequestErrorRate
    metadata:
      description: Frontend proxy experiencing errors from failed checkout attempts
  - group_id: accounting-service-1
    id: NoRequestsReceived
    metadata:
      description: Accounting service receives no requests as checkout cannot complete orders
  - group_id: accounting-service-1
    id: NoDatabaseOperations
    metadata:
      description: Accounting service performs no database operations without incoming checkout requests
  - group_id: email-service-1
    id: NoRequestsReceived
    metadata:
      description: Email service receives no order confirmation requests as checkout fails
  - group_id: fraud-detection-service-1
    id: NoRequestsReceived
    metadata:
      description: Fraud detection service receives no payment verification requests as checkout fails
fault:
