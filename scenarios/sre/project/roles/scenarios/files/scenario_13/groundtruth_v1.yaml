groups:
  - id: flagd-config
    kind: ConfigMap
    name: flagd-config
    namespace: otel-demo
    root_cause: true
  - filter:
      - payment\b
    id: payment-service-1
    kind: Service
    namespace: otel-demo
  - filter:
      - checkout\b
    id: checkout-service-1
    kind: Service
    namespace: otel-demo
  - filter:
      - frontend\b
    id: frontend-service-1
    kind: Service
    namespace: otel-demo
  - filter:
      - frontend-proxy\b
    id: frontend-proxy-service-1
    kind: Service
    namespace: otel-demo
  - filter:
      - accounting\b
    id: accounting-service-1
    kind: Service
    namespace: otel-demo
  - filter:
      - email\b
    id: email-service-1
    kind: Service
    namespace: otel-demo
  - filter:
      - fraud-detection\b
    id: fraud-detection-service-1
    kind: Service
    namespace: otel-demo
metadata:
  version: v1
propagations:
  - condition: Combined feature flags make payment service unavailable and cause charge method to fail
    effect: Payment service experiences compound failure with complete unavailability and charge request failures
    source: flagd-config
    target: payment-service-1
  - condition: Checkout service cannot connect to payment service and receives charge failures
    effect: Checkout operations fail completely when attempting to process any payments
    source: payment-service-1
    target: checkout-service-1
  - condition: Frontend receives errors from checkout when payment service is both unreachable and failing
    effect: Users cannot complete purchases, checkout flow completely blocked
    source: checkout-service-1
    target: frontend-service-1
  - condition: Frontend returns error responses to proxy for all failed checkout attempts
    effect: Users experience complete checkout failure through the proxy with no ability to complete orders
    source: frontend-service-1
    target: frontend-proxy-service-1
  - condition: Checkout service cannot complete orders due to payment failures
    effect: Accounting service receives no order completion events and performs no database operations
    source: checkout-service-1
    target: accounting-service-1
  - condition: Checkout service cannot complete orders due to payment failures
    effect: Email service receives no order confirmation requests
    source: checkout-service-1
    target: email-service-1
  - condition: Checkout service cannot process payments due to payment service failures
    effect: Fraud detection service receives no payment verification requests
    source: checkout-service-1
    target: fraud-detection-service-1
recommended_actions:
  - solution:
      actions:
        - Fix the payment service failure and unreachable error
      id: Fix the payment service failure and unreachable error
  - solution:
      actions:
        - Disable paymentFailure and paymentUnreachable flag
      id: Disable paymentFailure and paymentUnreachable flag
