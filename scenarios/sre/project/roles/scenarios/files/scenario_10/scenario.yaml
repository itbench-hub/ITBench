---
apiVersion: itbench.io/v2
kind: Scenario
metadata:
  name: scenario-10
spec:
  applications:
    opentelemetryDemo:
      enabled: true
      options:
        loadGeneration:
          browserTraffic: true
  faults:
    - injections:
        - args:
            flag:
              name: imageSlowLoad
              state: 10sec
            kubernetesObject:
              apiVersion: v1
              kind: ConfigMap
              metadata:
                name: flagd-config
                namespace: otel-demo
          id: opentelemetry-demo-feature-flag
      waitFor:
        postInjection:
          - args:
              kubernetesObject:
                apiVersion: apps/v1
                kind: Deployment
                metadata:
                  name: flagd
                  namespace: otel-demo
            id: restart-kubernetes-workload
          - args:
              kubernetesObject:
                apiVersion: apps/v1
                kind: Deployment
                metadata:
                  name: frontend
                  namespace: otel-demo
            id: restart-kubernetes-workload
  tools:
    sre:
      enabled: true
