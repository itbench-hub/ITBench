---
apiVersion: itbench.io/v2
kind: Scenario
metadata:
  name: scenario-21
spec:
  applications:
    opentelemetryDemo:
      enabled: true
  faults:
    - injections:
        - args:
            kubernetesObject:
              apiVersion: chaos-mesh.org/v1alpha1
              kind: Schedule
              metadata:
                name: valkey-memory-stress
                namespace: chaos-mesh
            scheduleSpec:
              stressChaos:
                duration: 55s
                mode: all
                selector:
                  labelSelectors:
                    app.kubernetes.io/component: valkey-cart
                  namespaces:
                    - otel-demo
                stressors:
                  memory:
                    size: 100%
                    workers: 4
              type: StressChaos
          id: scheduled-chaos-mesh-experiment
  tools:
    sre:
      enabled: true
