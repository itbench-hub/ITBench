---
- name: Request description
  ansible.builtin.pause:
    prompt: Please enter a description for the new scenario
  register: generator_scenario_description

- name: Create new scenario index
  ansible.builtin.copy:
    content: |
      {{
        scenario |
        ansible.builtin.combine({"id": index}) |
        ansible.builtin.to_nice_json
      }}
    dest: |-
      {{
        [
          playbook_dir,
          "..",
          "templates",
          "library",
          "indexes",
          "scenarios",
          index ~ ".json.j2"
        ] |
        ansible.builtin.path_join
      }}
    mode: "0644"
  register: generator_scenario_path
  vars:
    scenario:
      category: ""
      complexity: low
      description: "{{ generator_scenario_description.user_input }}"
      disruptions: []
      environment:
        applications: []
      solutionTemplates: []
    index: |-
      {{
        (
          generator_library_index.scenarios |
          map(attribute="index") |
          ansible.builtin.max
        ) +
        (
          1
        )
      }}

- name: Display file path
  ansible.builtin.debug:
    msg:
      - The new scenario has been generated.
      - Please edit the file located at the path below to complete the scenario.
      - "{{ generator_scenario_path.dest | ansible.builtin.realpath }}"
      - ""
      - Once done, use `make generate-library` and `make validate-library` to complete the generation and verification of the scenario.
      - ""
      - Once verified, use `make generate-resource-files` to create the implementation file(s) and add the implementation.
