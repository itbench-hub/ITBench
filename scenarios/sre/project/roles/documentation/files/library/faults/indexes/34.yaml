---
alerts:
  application:
    - KubePodNotReady
  goldenSignal:
    - HighRequestErrorRate
arguments:
  jsonSchema:
    properties:
      kubernetesObject:
        properties:
          apiVersion:
            enum:
              - apps/v1
            type: string
          kind:
            enum:
              - Deployment
              - StatefulSet
            type: string
          metadata:
            properties:
              name:
                type: string
              namespace:
                type: string
            required:
              - name
              - namespace
            type: object
        required:
          - apiVersion
          - kind
          - metadata
        type: object
    required:
      - kubernetesObject
    type: object
description: >-
  This fault cordons all worker nodes and then evicts the target workload pods,
  simulating a cluster-wide availability loss where the control plane becomes unable
  to schedule or maintain workloads. This reproduces real-world incidents where
  clusters become completely inaccessible or unresponsive.
expectation: >-
  The target workload pods will be evicted and unable to reschedule due to all nodes
  being cordoned. Services depending on the workload will experience errors. The cluster
  will appear degraded with multiple pods in Pending state.
name: Cluster Availability Loss
platform: Kubernetes
resources:
  - https://kubernetes.io/docs/concepts/architecture/nodes/
  - https://kubernetes.io/docs/tasks/administer-cluster/safely-drain-node/
  - https://kubernetes.io/docs/reference/kubectl/generated/kubectl_cordon/
  - https://kubernetes.io/docs/tasks/debug/debug-cluster/
solutions:
  templates:
    - steps:
        - command: kubectl get nodes
          text: Identify which worker nodes are cordoned.
        - text: Uncordon all affected worker nodes to restore scheduling.
    - steps:
        - text: >-
            Investigate the root cause of the cluster unavailability (etcd health,
            API server logs, node conditions) before uncordoning.
tags:
  - Deployment
  - Performance
