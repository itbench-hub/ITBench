---
alerts:
  application:
    - KubePodCrashLooping
    - KubePodNotReady
arguments:
  jsonSchema:
    properties:
      container:
        properties:
          name:
            type: string
        required:
          - name
        type: object
      kubernetesObject:
        properties:
          apiVersion:
            enum:
              - apps/v1
            type: string
          kind:
            enum:
              - Deployment
              - StatefulSet
            type: string
          metadata:
            properties:
              name:
                type: string
              namespace:
                type: string
            required:
              - name
              - namespace
            type: object
        required:
          - apiVersion
          - kind
          - metadata
        type: object
    required:
      - kubernetesObject
      - container
    type: object
description: >-
  This fault modifies a controller or operator workload's container command to an invalid value,
  causing the pod to enter a CrashLoopBackOff state. This simulates real-world incidents where
  controller pods crash due to configuration errors, incompatible upgrades, or corrupted state,
  leading to service degradation across the cluster.
expectation: >-
  The faulted controller pod(s) will enter CrashLoopBackOff state. Dependent services will
  experience degradation as the controller is unable to reconcile resources.
name: Crashing Kubernetes Controller Workload
platform: Kubernetes
resources:
  - https://kubernetes.io/docs/concepts/workloads/pods/pod-lifecycle/
  - https://kubernetes.io/docs/concepts/workloads/controllers/deployment/
  - https://kubernetes.io/docs/tasks/debug/debug-application/debug-running-pod/
  - https://kubernetes.io/docs/reference/kubernetes-api/workload-resources/
solutions:
  templates:
    - steps:
        - command: >-
            kubectl -n {{ args.kubernetesObject.metadata.namespace }} rollout undo
            {{ args.kubernetesObject.kind | lower }}/{{ args.kubernetesObject.metadata.name }}
          text: Revert the last change done to the controller manifest.
    - steps:
        - command: >-
            kubectl -n {{ args.kubernetesObject.metadata.namespace }} edit
            {{ args.kubernetesObject.kind | lower }} {{ args.kubernetesObject.metadata.name }}
          text: Manually edit the manifest and replace the container command with the correct value.
    - steps:
        - command: >-
            kubectl -n {{ args.kubernetesObject.metadata.namespace }} logs
            -l app={{ args.kubernetesObject.metadata.name }} -c {{ args.container.name }} --previous
          text: Check the previous container logs to understand the crash reason.
tags:
  - Deployment
  - Performance
