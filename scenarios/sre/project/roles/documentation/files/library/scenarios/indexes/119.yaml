# yaml-language-server: $schema=../schema.json
---
alerts:
  - HighRequestErrorRate
category: sre
complexity: medium
description: This scenario simulates a breaking configuration change on the OpenTelemetry Demo's `cart` service by injecting an invalid environment variable,
  causing the service to malfunction and degrading the shopping cart workflow.
disruptions:
  - injections:
      - args:
          container:
            name: cart
          kubernetesObject:
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: cart
              namespace: otel-demo
        id: breaking-configuration-change
environment:
  applications:
    - id: opentelemetry-demo
id: 119
platforms:
  - Kubernetes
solutions:
  - - steps:
        - command: kubectl -n otel-demo rollout undo deployment/cart
          text: Revert the last change done to the workload manifest.
    - steps:
        - command: kubectl -n otel-demo edit deployment cart
          text: Manually edit the manifest and replace the environment variable with the correct value.
tags:
  - Code
  - Deployment
