---
alerts:
  - KubePodNotReady
category: sre
complexity: low
description: This scenario simulates OpenTelemetry Demo's `ad` and `cart` services being deployed on the wrong node.
disruptions:
  - injections:
      - args:
          kubernetesObject:
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: ad
              namespace: otel-demo
        id: nonexistent-kubernetes-workload-node
      - args:
          kubernetesObject:
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: cart
              namespace: otel-demo
        id: nonexistent-kubernetes-workload-node
environment:
  applications:
    - id: opentelemetry-demo
id: 33
platforms:
  - Kubernetes
solutions:
  - - steps:
        - command: kubectl -n otel-demo rollout undo deployment/ad
          text: Revert the last change done to the manifest.
    - steps:
        - command: kubectl -n otel-demo edit deployment ad
          text: Manually edit the manifest and replace the node selector with the correct value.
  - - steps:
        - command: kubectl -n otel-demo rollout undo deployment/cart
          text: Revert the last change done to the manifest.
    - steps:
        - command: kubectl -n otel-demo edit deployment cart
          text: Manually edit the manifest and replace the node selector with the correct value.
tags:
  - Deployment
  - Performance
