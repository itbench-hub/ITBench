---
alerts:
  - KubePodNotReady
category: sre
complexity: low
description: This scenario simulates OpenTelemetry Demo's `payment` service being unable to schedule a new pod.
disruptions:
  - injections:
      - args:
          kubernetesObject:
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: payment
              namespace: otel-demo
        id: cordoned-kubernetes-worker-node
environment:
  applications:
    - id: opentelemetry-demo
id: 39
platforms:
  - Kubernetes
solutions:
  - - steps:
        - command: kubectl -n otel-demo rollout undo deployment/payment
          text: Revert the last change done to the manifest.
    - steps:
        - command: kubectl -n otel-demo edit deployment payment
          text: Manually edit the manifest and replace the node selector with the correct value.
    - steps:
        - command: kubectl get nodes --selector='node-role.kubernetes.io/node='
          text: Retrieve all worker node nodes
        - text: Uncordon all worker nodes which are cordoned.
tags:
  - Deployment
  - Performance
