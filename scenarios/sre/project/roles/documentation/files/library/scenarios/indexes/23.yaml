---
alerts:
- KubePodNotReady
category: sre
complexity: medium
description: This scenario changes the environment variables of OpenTelemetry Demo's `shipping` service, causing it to be unable to reach the `quote` service.
disruptions:
- injections:
  - args:
      container:
        name: checkout
      kubernetesObject:
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: checkout
          namespace: otel-demo
    id: unsupported-architecture-kubernetes-workload-container-image
environment:
  applications:
  - id: opentelemetry-demo
id: 23
platforms:
- Kubernetes
solutions:
- - steps:
    - command: kubectl -n otel-demo rollout undo deployment/checkout
      text: Revert the last change done to the manifest.
  - steps:
    - command: kubectl -n otel-demo edit deployment checkout
      text: Manually edit the manifest and replace the invalid image with the correct value.
  - steps:
    - command: kubectl -n otel-demo edit deployment checkout
      text: Manually edit the manifest and replace the node selector to allow Kubernetes to schedule the workload on a supported node (if exists).
tags:
- Deployment
- Performance
