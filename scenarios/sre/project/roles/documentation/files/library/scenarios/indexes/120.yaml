# yaml-language-server: $schema=../schema.json
---
alerts:
  - HighRequestErrorRate
category: sre
complexity: medium
description: This scenario simulates a credential failure by corrupting the Secret used by the OpenTelemetry Demo's `email` service, causing it to fail when
  attempting to authenticate with external services.
disruptions:
  - injections:
      - args:
          kubernetesObject:
            apiVersion: v1
            kind: Secret
            metadata:
              name: email-service-secret
              namespace: otel-demo
        id: corrupted-kubernetes-secret-credentials
environment:
  applications:
    - id: opentelemetry-demo
id: 120
platforms:
  - Kubernetes
solutions:
  - - steps:
        - command: kubectl -n otel-demo get secret email-service-secret -o yaml
          text: Inspect the corrupted secret to identify the invalid data.
        - text: Restore the secret with correct credentials from the credential management system.
    - steps:
        - text: Rotate the credentials in the external system and update the Kubernetes Secret to match.
tags:
  - Authentication
  - Deployment
