---
alerts: []
category: sre
complexity: low
description: This scenario simulates Kubernetes API server being stressed during OpenTelemetry Demo's execution.
disruptions:
- injections:
  - args:
      kubernetesObject:
        apiVersion: chaos-mesh.org/v1alpha1
        kind: Schedule
        metadata:
          name: api-server-memory-stress
          namespace: chaos-mesh
      scheduleSpec:
        stressChaos:
          duration: 55s
          mode: one
          selector:
            labelSelectors:
              component: kube-apiserver
            namespaces:
            - kube-system
          stressors:
            memory:
              size: 6GB
              workers: 4
        type: StressChaos
    id: scheduled-chaos-mesh-experiment
environment:
  applications:
  - id: opentelemetry-demo
id: 54
platforms:
- Kubernetes
solutions:
- - steps:
    - command: kubectl -n chaos-mesh annotate schedule api-server-memory-stress experiment.chaos-mesh.org/pause='true'
      text: Annotate the schedule to pause the active experiment.
    - command: kubectl -n chaos-mesh get stresschaos --selector='experiment.chaos-mesh.org/pause=true'
      text: Retrieve the associated experiment managed by the schedule.
    - text: Delete the retrieved experiement after it has entered the `Paused` state.
    - command: kubectl -n chaos-mesh delete schedule api-server-memory-stress experiment.chaos-mesh.org/pause='true'
      text: Delete the schedule.
tags:
- Deployment
- Performance
