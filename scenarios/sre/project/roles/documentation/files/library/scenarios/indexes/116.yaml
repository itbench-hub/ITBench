---
alerts:
  - KubePodNotReady
category: sre
complexity: high
description: This scenario simulates etcd storage exhaustion by filling the cluster's etcd database with large ConfigMaps, causing the API server to reject
  writes and degrading cluster-wide operations including the OpenTelemetry Demo application.
disruptions:
  - injections:
      - args:
          kubernetesObject:
            apiVersion: apps/v1
            kind: StatefulSet
            metadata:
              name: etcd
              namespace: otel-demo
        id: exhausted-etcd-database-storage
environment:
  applications:
    - id: opentelemetry-demo
id: 116
platforms:
  - Kubernetes
solutions:
  - - steps:
        - text: Compact and defragment the etcd database to reclaim storage space.
        - text: Remove unnecessary resources (completed jobs, orphaned ConfigMaps) to reduce etcd storage usage.
    - steps:
        - text: Increase the etcd storage quota if the current limit is too low for the cluster workload.
tags:
  - Performance
