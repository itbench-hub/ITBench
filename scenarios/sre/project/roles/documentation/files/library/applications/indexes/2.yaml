---
arguments:
  jsonSchema:
    properties:
      autoscaling:
        minProperties: 1
        properties:
          kubernetes:
            properties:
              hpa:
                default: false
                description: Enables autoscaling through Kubernetes Horizontal Pod Autoscaler. Defaults to false.
                type: boolean
            type: object
        type: object
      loadGeneration:
        minProperties: 1
        properties:
          browserTraffic:
            default: false
            description: Enables additional load generation through simulated Chrome browsers. Defaults to false.
            type: boolean
          userSpawnRate:
            default: 5
            description: Per second user creation rate. Defaults to 5.
            type: integer
          users:
            default: 50
            description: Initial number of simulated users. Defaults to 50.
            type: integer
        type: object
    type: object
authors:
  - OpenTelemetry
description: This microservice application is primarily used to showcase the capabitlities of OpenTelemetry.
name: OpenTelemetry Demo
platforms:
  - Kubernetes
repository: https://github.com/open-telemetry/opentelemetry-demo
resources:
  - https://opentelemetry.io/docs/demo/
  - https://opentelemetry.io/docs/demo/architecture/
