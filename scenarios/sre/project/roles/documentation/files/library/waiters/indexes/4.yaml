---
arguments:
  jsonSchema:
    properties:
      kubernetesObject:
        properties:
          apiVersion:
            enum:
              - apps/v1
            type: string
          kind:
            enum:
              - Deployment
              - StatefulSet
            type: string
          metadata:
            properties:
              name:
                type: string
              namespace:
                type: string
            required:
              - name
              - namespace
            type: object
        required:
          - apiVersion
          - kind
          - metadata
        type: object
      replicas:
        exclusiveMinimum: true
        minimum: 0
        type: integer
    required:
      - kubernetesObject
      - replicas
    type: object
description: Waits for a Kubernetes workload to scale to the requested number of replicas.
name: Scale Kubernetes Workload
platform: Kubernetes
