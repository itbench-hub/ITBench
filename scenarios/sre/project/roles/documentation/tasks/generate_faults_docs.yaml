---
- name: Retrieve all fault index templates
  ansible.builtin.find:
    path: "{{ role_path }}/files/library/faults/indexes"
  register: documentation_faults_indexes

- name: Create identifiers for fault indexes
  ansible.builtin.set_fact:
    documentation_faults_library: |
      {{
        (
          documentation_faults_library |
          ansible.builtin.default([])
        ) +
        [
          (
            fault |
            ansible.builtin.combine(
              {
                "id": (
                  fault.name |
                  ansible.builtin.lower |
                  ansible.builtin.replace(" ", "-")
                ),
                "index": (
                  fault_index.path |
                  ansible.builtin.basename |
                  ansible.builtin.splitext |
                  ansible.builtin.first |
                  ansible.builtin.int
                )
              }
            )
          )
        ]
      }}
  loop: "{{ documentation_faults_indexes.files }}"
  loop_control:
    label: file/{{ fault_index.path | ansible.builtin.basename }}
    loop_var: fault_index
  vars:
    fault: |-
      {{
        lookup("ansible.builtin.file", fault_index.path) |
        ansible.builtin.from_yaml
      }}

- name: Generate faults library index
  ansible.builtin.copy:
    content: |
      {{
        documentation_faults_library |
        ansible.builtin.sort(attribute="name") |
        ansible.builtin.to_nice_json
      }}
    dest: "{{ [role_path, 'files', 'library', 'faults', 'index.json'] | ansible.builtin.path_join }}"
    mode: "0644"

- name: Generate Faults README
  ansible.builtin.copy:
    content: "{{ lookup('ansible.builtin.template', 'templates/readmes/faults.j2') }}"
    dest: "{{ playbook_dir }}/../docs/faults.md"
    mode: "0644"
  vars:
    documentation_contents: |-
      {{
        lookup("ansible.builtin.file", "files/library/faults/index.json") |
        ansible.builtin.from_json
      }}
