---
- name: Manage SRE and FinOps AWX Stack
  hosts:
    - localhost
  pre_tasks:
    - name: Import executables role
      ansible.builtin.import_role:
        name: executables
      tags:
        - always

    - name: Import cluster role
      ansible.builtin.import_role:
        name: cluster
      tags:
        - always
      vars:
        cluster_files:
          kubeconfig: "{{ stack.awx.kubeconfig }}"
  tasks:
    - name: Import role variables
      tags:
        - configure_awx
      block:
        - name: Create configuration variable
          ansible.builtin.set_fact:
            awx_configuration:
              agent:
                configuration: "{{ agent_configuration.configuration }}"
              github: "{{ github }}"
              scenarios: "{{ experiments.scenarios }}"

        - name: Add providers variable
          ansible.builtin.set_fact:
            awx_configuration: "{{ awx_configuration | combine({'providers': {'aws': {'enabled': true}}}) }}"
          when:
            - cluster_provider != "kind"

        - name: Create experiments variable
          ansible.builtin.set_fact:
            awx_experiments:
              runners:
                kubeconfigs: "{{ stack.runners.kubeconfigs }}"

    - name: Import role variables
      tags:
        - launch_workflows
      block:
        - name: Validate that workflow type was provided
          ansible.builtin.assert:
            that:
              - workflow_type is defined
            fail_msg: Workflow type undefined. Please include this argument via the CLI.
            success_msg: Workflow type defined.

        - name: Create experiments variable
          ansible.builtin.set_fact:
            awx_experiments:
              agent:
                version: "{{ agent_configuration.version }}"
              runners:
                kubeconfigs: "{{ stack.runners.kubeconfigs }}"
              trials: "{{ experiments.trials }}"
              workflow: "{{ workflow_type }}"

        - name: Add storage variable
          ansible.builtin.set_fact:
            awx_experiments: "{{ awx_experiments | combine({'storage': storage}) }}"
          when:
            - storage is defined

    - name: Import awx role
      ansible.builtin.import_role:
        name: awx
      vars:
        awx_cluster:
          kubeconfig: "{{ stack.awx.kubeconfig }}"
          provider: "{{ cluster_provider }}"
