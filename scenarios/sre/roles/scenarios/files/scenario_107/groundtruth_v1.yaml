---
apiVersion: itbench.io/v1
kind: GroundTruth
metadata:
  name: scenario-107
spec:
  alerts:
    - group_id: accounting-deployment-1
      id: HighKafkaConsumerLag
      metadata:
        description: Kafka consumer group accumulates message lag as no consumers are processing
    - group_id: accounting-deployment-1
      id: KafkaConsumerGroupInactive
      metadata:
        description: Kafka consumer group has zero active members
    - group_id: accounting-deployment-1
      id: NoDatabaseOperations
      metadata:
        description: Accounting service stopped performing database write operations
  aliases:
    - - accounting-deployment-1
      - accounting-pod-1
  fault:
    - category: Change
      condition: Deployment scaled to zero replicas
      entity:
        group_id: accounting-deployment-1
        kind: Deployment
        name: accounting
      fault_mechanism: scaled_to_zero_workload
  groups:
    - id: accounting-deployment-1
      kind: Deployment
      namespace: otel-demo
      name: accounting
      root_cause: true
    - filter:
        - accounting-.*
      id: accounting-pod-1
      kind: Pod
      namespace: otel-demo
  propagations:
    - condition: Deployment scaled to zero replicas
      effect: All pods for the workload are terminated
      source: accounting-deployment-1
      target: accounting-pod-1
    - condition: All accounting pods terminated
      effect: Kafka consumer group becomes inactive with zero members
      source: accounting-pod-1
      target: accounting-deployment-1
    - condition: Kafka consumer group inactive
      effect: Messages accumulate in Kafka topics causing consumer lag
      source: accounting-pod-1
      target: accounting-deployment-1
    - condition: No accounting service pods running
      effect: Database write operations from accounting service stop
      source: accounting-pod-1
      target: accounting-deployment-1
  recommendedActions:
    - solution:
        actions:
          - Scale the deployment back to at least 1 replica to restore Kafka consumer processing
        id: scale_deployment_back_to_restore_consumers
    - solution:
        actions:
          - Revert the last change to the deployment manifest to restore original replica count
        id: rollout_undo_deployment_to_restore_replicas
