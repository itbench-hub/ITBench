---
apiVersion: itbench.io/v2
kind: Scenario
metadata:
  name: scenario-53
spec:
  applications:
    bookInfo:
      enabled: true
  faults:
    - injections:
        - args:
            container:
              name: reviews
            kubernetesObject:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: reviews-v3
                namespace: book-info
          id: nonexistent-kubernetes-workload-persistent-volume-claim
      waitFor:
        postInjection:
          - args:
              kubernetesObject:
                apiVersion: apps/v1
                kind: Deployment
                metadata:
                  name: reviews-v3
                  namespace: book-info
            id: force-workload-restart-by-scaling
  tools:
    sre:
      enabled: true
