---
apiVersion: itbench.io/v1
kind: GroundTruth
metadata:
  name: scenario-56
spec:
  alerts:
    - group_id: productcatalog-pod-1
      id: KubePodNotReady
      metadata:
        description: Product catalog pod not ready due to ImagePullBackOff (rolling update protects service availability)
    - group_id: productcatalog-pod-1
      id: KubeContainerWaiting
      metadata:
        description: Product catalog container waiting due to image pull failure
  aliases:
    - - productcatalog-pod-1
      - productcatalog-deployment-1
  fault:
    - category: Change
      condition: Invalid image specified in deployment during rolling update
      entity:
        group_id: productcatalog-deployment-1
        kind: Deployment
        name: product-catalog
      fault_mechanism: modify-kubernetes-workload-container-image
  groups:
    - filter:
        - product-catalog-.*
      id: productcatalog-deployment-1
      kind: Deployment
      namespace: otel-demo
      root_cause: true
    - filter:
        - product-catalog-.*
      id: productcatalog-pod-1
      kind: Pod
      namespace: otel-demo
  propagations:
    - condition: product-catalog deployment updated to point to an invalid image
      effect: new product-catalog pod enters ImagePullBackOff state while old pod continues serving traffic
      source: productcatalog-deployment-1
      target: productcatalog-pod-1
  recommended_actions:
    - solution:
        actions:
          - Identify the deployment with failing pods using kubectl get pods
          - Check pod events and logs to determine image pull failure
          - Update deployment image to correct path using kubectl set image
          - Verify new pods start successfully
        id: fix_invalid_image_in_rolling_update
