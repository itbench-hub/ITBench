---
apiVersion: itbench.io/v2
kind: GroundTruth
metadata:
  name: scenario-51
spec:
  alerts: []
  entities:
    - apiVersion: v1
      kind: Namespace
      metadata:
        name: otel-demo
  solutions:
    - - steps:
          - command: kubectl -n otel-demo get deployments
            text: List all deployments in the namespace to identify the load generator.
          - command: kubectl -n otel-demo delete deployment workload-scanner
            text: Delete the workload-scanner deployment that is generating the API load.
          - command: kubectl -n otel-demo delete clusterrole workload-scanner
            text: Clean up the associated ClusterRole.
          - command: kubectl -n otel-demo delete clusterrolebinding workload-scanner
            text: Clean up the associated ClusterRoleBinding.
