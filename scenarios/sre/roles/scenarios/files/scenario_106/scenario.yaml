---
apiVersion: itbench.io/v2
kind: Scenario
metadata:
  name: scenario-106
spec:
  applications:
    opentelemetryDemo:
      enabled: true
  faults:
    - injections:
        - args:
            configMapName: features
            kubernetesObject:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: recommendation
                namespace: otel-demo
          id: malformed-configmap-causing-service-crash
  tools:
    chaosEngineering:
      chaosMesh:
        enabled: false
    costMonitoring:
      opencost:
        enabled: false
    observability:
      topology:
        enabled: true
      traces:
        enabled: true
