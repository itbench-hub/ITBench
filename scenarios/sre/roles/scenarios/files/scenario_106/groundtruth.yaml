---
apiVersion: itbench.io/v2
kind: GroundTruth
metadata:
  name: scenario-106
spec:
  alerts:
    - labels: {}
      name: KubePodCrashLooping
    - labels: {}
      name: KubePodNotReady
  entities:
    - apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: recommendation
        namespace: otel-demo
  solutions:
    - - steps:
          - command: kubectl -n otel-demo rollout undo deployment/recommendation
            text: Revert the last change done to the manifest.
    - - steps:
          - command: kubectl -n otel-demo edit deployment recommendation
            text: Manually edit the manifest and remove the malformed ConfigMap volumes.
          - command: kubectl -n otel-demo delete configmap features
            text: Delete the injected malformed ConfigMap object.
    - - steps:
          - command: kubectl -n otel-demo edit configmap features
            text: Manually edit the ConfigMap and fix the malformed JSON to be properly formatted.
