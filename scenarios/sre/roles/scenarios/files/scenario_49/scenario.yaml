---
apiVersion: itbench.io/v2
kind: Scenario
metadata:
  name: scenario-49
spec:
  applications:
    opentelemetryDemo:
      enabled: true
  faults:
    - injections:
        - args:
            container:
              name: cart
            kubernetesObject:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: cart
                namespace: otel-demo
          id: misconfigured-kubernetes-workload-container-readiness-probe
      waitFor:
        postInjection:
          - args:
              kubernetesObject:
                apiVersion: apps/v1
                kind: Deployment
                metadata:
                  name: cart
                  namespace: otel-demo
            id: force-workload-restart-by-scaling
  tools:
    sre:
      enabled: true
