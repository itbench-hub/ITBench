---
apiVersion: itbench.io/v1
kind: GroundTruth
metadata:
  name: scenario-49
spec:
  alerts:
    - group_id: frontend-deployment-1
      id: KubeDeploymentRolloutStuck
      metadata:
        description: Frontend deployment rollout stuck due to misconfigured readiness probe
  aliases:
    - - frontend-deployment-1
      - frontend-pod-1
    - - frontend-pod-1
      - frontend-service-1
  fault:
    - category: Configuration
      condition: Frontend deployment has misconfigured readiness probe (wrong port)
      entity:
        group_id: frontend-deployment-1
        kind: Deployment
        name: frontend
      fault_mechanism: misconfigured-readiness-probe
  groups:
    - filter:
        - frontend\b
      id: frontend-deployment-1
      kind: Deployment
      namespace: otel-demo
      root_cause: true
    - filter:
        - frontend-.*
      id: frontend-pod-1
      kind: Pod
      namespace: otel-demo
    - filter:
        - frontend\b
      id: frontend-service-1
      kind: Service
      namespace: otel-demo
  propagations:
    - condition: Deployment has misconfigured readiness probe on port 40 (incorrect)
      effect: Deployment rollout stuck trying to verify pod readiness
      source: frontend-deployment-1
      target: frontend-deployment-1
    - condition: Deployment rollout stuck
      effect: New pods created but never become ready
      source: frontend-deployment-1
      target: frontend-pod-1
    - condition: Pods not ready due to failing readiness probe
      effect: Frontend service has no healthy endpoints
      source: frontend-pod-1
      target: frontend-service-1
  recommendedActions: []
