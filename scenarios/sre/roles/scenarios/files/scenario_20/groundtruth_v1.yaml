---
apiVersion: itbench.io/v1
kind: GroundTruth
metadata:
  name: scenario-20
spec:
  alerts:
    - group_id: frontend-proxy-service-1
      id: HighRequestErrorRate
      metadata:
        description: Frontend-proxy service error rate above threshold propagated from frontend
    - group_id: frontend-service-1
      id: HighRequestErrorRate
      metadata:
        description: Frontend service error rate above threshold due to product-catalog unavailability
    - group_id: recommendation-service-1
      id: HighRequestErrorRate
      metadata:
        description: Recommendation service error rate above threshold due to product-catalog unavailability
    - group_id: checkout-service-1
      id: HighRequestErrorRate
      metadata:
        description: Checkout service error rate above threshold propagated from frontend
    - group_id: productcatalog-pod-1
      id: KubePodNotReady
      metadata:
        description: Product catalog pod not ready due to ImagePullBackOff
    - group_id: productcatalog-pod-1
      id: KubeContainerWaiting
      metadata:
        description: Product catalog container waiting due to image pull failure
  aliases:
    - - productcatalog-pod-1
      - productcatalog-deployment-1
  fault:
    - category: Change
      condition: Invalid image specified in deployment
      entity:
        group_id: productcatalog-deployment-1
        kind: Deployment
        name: product-catalog
      fault_mechanism: nonexistent-kubernetes-workload-container-image
  groups:
    - filter:
        - product-catalog-.*
      id: productcatalog-deployment-1
      kind: Deployment
      namespace: otel-demo
      root_cause: true
    - filter:
        - product-catalog-.*
      id: productcatalog-pod-1
      kind: Pod
      namespace: otel-demo
    - filter:
        - frontend-proxy\b
      id: frontend-proxy-service-1
      kind: Service
      namespace: otel-demo
    - filter:
        - frontend\b
      id: frontend-service-1
      kind: Service
      namespace: otel-demo
    - filter:
        - checkout\b
      id: checkout-service-1
      kind: Service
      namespace: otel-demo
    - filter:
        - recommendation\b
      id: recommendation-service-1
      kind: Service
      namespace: otel-demo
  propagations:
    - condition: product-catalog deployment updated to point to an invalid image
      effect: product-catalog pod enters ImagePullBackOff state
      source: productcatalog-deployment-1
      target: productcatalog-pod-1
    - condition: product-catalog service has zero healthy endpoints after forced restart
      effect: frontend service experiences request errors when calling product-catalog
      source: productcatalog-pod-1
      target: frontend-service-1
    - condition: product-catalog service has zero healthy endpoints after forced restart
      effect: recommendation service experiences request errors when calling product-catalog
      source: productcatalog-pod-1
      target: recommendation-service-1
  recommended_actions:
    - solution:
        actions:
          - change the image field in productcatalogueservice deployment pointing to the correct image
        id: change_the_image_field_in_productcatalogueservice_deployment_pointing_to_the_correct_image
