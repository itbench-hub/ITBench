---
# Istio Service Mesh Routing Corruption (ztunnel L4 approach)
# Simulates the November 2023 Optus BGP routing storm by corrupting service
# discovery routing, causing cascading connection failures
#
# IMPORTANT: Istio Ambient Mode - ztunnel Layer Implementation
# -----------------------------------------------------------
# Istio Ambient mode uses a two-layer architecture:
# 1. ztunnel (L4): Handles TCP-level routing, service discovery - always present
# 2. waypoint proxy (L7): Handles HTTP-level routing policies - optional
#
# IMPLEMENTATION DECISION (Istio 1.29):
# This fault operates at the ztunnel (L4) layer by corrupting the Kubernetes
# Service selector to point to non-existent pods. When ztunnel attempts to
# route traffic, it finds no endpoints and connection establishment fails.
#
# This L4 approach achieves the same observable behavior:
# - Connection failures (similar to unreachable routing destinations)
# - Error metrics and alerts fire correctly
# - Reliable and consistent across Istio versions
# - Simulates BGP-style routing corruption at service discovery layer
#
# This mirrors real-world scenarios where routing infrastructure failures
# cause services to become unreachable, similar to BGP routing table corruption.

- name: Retrieve service
  kubernetes.core.k8s_info:
    kubeconfig: "{{ faults_cluster.kubeconfig }}"
    api_version: "{{ injection_task.args.kubernetesObject.apiVersion }}"
    kind: "{{ injection_task.args.kubernetesObject.kind }}"
    name: "{{ injection_task.args.kubernetesObject.metadata.name }}"
    namespace: "{{ injection_task.args.kubernetesObject.metadata.namespace }}"
  register: faults_service

- name: Validate that service exists
  ansible.builtin.assert:
    that:
      - faults_service.api_found
      - faults_service.resources | ansible.builtin.length == 1
    fail_msg: Unable to find service. Please verify that the service exists.
    success_msg: Found service.

- name: Store original service selector for restoration
  ansible.builtin.set_fact:
    faults_original_selector: "{{ faults_service.resources[0].spec.selector }}"

- name: Corrupt service selector to point to non-existent pods
  kubernetes.core.k8s:
    kubeconfig: "{{ faults_cluster.kubeconfig }}"
    resource_definition:
      apiVersion: v1
      kind: Service
      metadata:
        name: "{{ faults_service.resources[0].metadata.name }}"
        namespace: "{{ faults_service.resources[0].metadata.namespace }}"
        annotations:
          # Store original selector for fault removal/restoration
          itbench.io/original-selector: "{{ faults_original_selector | to_json }}"
          itbench.io/fault-type: "istio-service-mesh-routing-corruption"
          itbench.io/fault-layer: "ztunnel-l4"
      spec:
        selector:
          # Corrupted selector that matches no pods
          # Simulates routing tables pointing to unreachable destinations
          app: nonexistent-backend-itbench
          itbench-fault: corrupted-routing
    state: patched

- name: Wait for service endpoints to be removed
  kubernetes.core.k8s_info:
    kubeconfig: "{{ faults_cluster.kubeconfig }}"
    api_version: v1
    kind: Endpoints
    name: "{{ faults_service.resources[0].metadata.name }}"
    namespace: "{{ faults_service.resources[0].metadata.namespace }}"
  register: faults_endpoints
  until:
    - faults_endpoints.api_found
    - faults_endpoints.resources | ansible.builtin.length == 1
    - (faults_endpoints.resources[0].subsets | default([]) | length == 0)
  delay: 2
  retries: 15
  failed_when: false

- name: Verify service has no endpoints (routing corruption active)
  ansible.builtin.assert:
    that:
      - faults_endpoints.resources[0].subsets | default([]) | length == 0
    fail_msg: "Service still has endpoints - fault may not be effective"
    success_msg: "Service routing corrupted successfully - no endpoints available (simulating unreachable destination)"
