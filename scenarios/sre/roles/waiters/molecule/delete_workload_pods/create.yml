---
- name: Create Kubernetes objects
  hosts:
    - environment
  tasks:
    - name: Create namespace
      kubernetes.core.k8s:
        kubeconfig: "{{ cluster.kubeconfig }}"
        resource_definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: delete-workload-pods-test
        state: present

    - name: Create deployment
      kubernetes.core.k8s:
        kubeconfig: "{{ cluster.kubeconfig }}"
        resource_definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: test-deployment
            namespace: delete-workload-pods-test
          spec:
            replicas: 2
            selector:
              matchLabels:
                app.kubernetes.io/name: test-deployment
            template:
              metadata:
                labels:
                  app.kubernetes.io/name: test-deployment
              spec:
                containers:
                  - name: server
                    image: registry.access.redhat.com/ubi10-minimal:10.1-1773895769
                    command:
                      - /bin/sh
                    args:
                      - -c
                      - "sleep infinity"
        state: present
        wait: true

    - name: Create statefulset
      kubernetes.core.k8s:
        kubeconfig: "{{ cluster.kubeconfig }}"
        resource_definition:
          apiVersion: apps/v1
          kind: StatefulSet
          metadata:
            name: test-statefulset
            namespace: delete-workload-pods-test
          spec:
            replicas: 2
            selector:
              matchLabels:
                app.kubernetes.io/name: test-statefulset
            serviceName: test-statefulset
            template:
              metadata:
                labels:
                  app.kubernetes.io/name: test-statefulset
              spec:
                containers:
                  - name: server
                    image: registry.access.redhat.com/ubi10-minimal:10.1-1773895769
                    command:
                      - /bin/sh
                    args:
                      - -c
                      - "sleep infinity"
        state: present
        wait: true
