---
- name: Retrieve workload current state
  kubernetes.core.k8s_info:
    kubeconfig: "{{ waiters_cluster.kubeconfig }}"
    api_version: "{{ waiter_args.kubernetesObject.apiVersion }}"
    kind: "{{ waiter_args.kubernetesObject.kind }}"
    name: "{{ waiter_args.kubernetesObject.metadata.name }}"
    namespace: "{{ waiter_args.kubernetesObject.metadata.namespace }}"
  register: waiters_workload

- name: Verify workload exists
  ansible.builtin.assert:
    that: waiters_workload.resources | ansible.builtin.length == 1
    fail_msg: Unable to find workload. Please ensure that workload exists.
    success_msg: Workload verified.

- name: Save original replica count
  ansible.builtin.set_fact:
    waiters_original_replicas: "{{ waiters_workload.resources[0].spec.replicas }}"

- name: Extract pod selector labels from deployment
  ansible.builtin.set_fact:
    waiters_pod_selector: "{{ waiters_workload.resources[0].spec.selector.matchLabels }}"

- name: Scale workload to zero replicas
  kubernetes.core.k8s_scale:
    kubeconfig: "{{ waiters_cluster.kubeconfig }}"
    api_version: "{{ waiter_args.kubernetesObject.apiVersion }}"
    kind: "{{ waiter_args.kubernetesObject.kind }}"
    name: "{{ waiter_args.kubernetesObject.metadata.name }}"
    namespace: "{{ waiter_args.kubernetesObject.metadata.namespace }}"
    replicas: 0
    wait: true
    wait_timeout: 120

- name: Build label selector list from matchLabels
  ansible.builtin.set_fact:
    waiters_label_selector_list: "{{ waiters_pod_selector | dict2items | map('join', '=') | list }}"

- name: Wait for all pods to terminate
  kubernetes.core.k8s_info:
    kubeconfig: "{{ waiters_cluster.kubeconfig }}"
    api_version: v1
    kind: Pod
    namespace: "{{ waiter_args.kubernetesObject.metadata.namespace }}"
    label_selectors: "{{ waiters_label_selector_list }}"
  register: waiters_pods
  until: waiters_pods.resources | ansible.builtin.length == 0
  retries: 30
  delay: 2

- name: Scale workload back to original replica count
  kubernetes.core.k8s_scale:
    kubeconfig: "{{ waiters_cluster.kubeconfig }}"
    api_version: "{{ waiter_args.kubernetesObject.apiVersion }}"
    kind: "{{ waiter_args.kubernetesObject.kind }}"
    name: "{{ waiter_args.kubernetesObject.metadata.name }}"
    namespace: "{{ waiter_args.kubernetesObject.metadata.namespace }}"
    replicas: "{{ waiters_original_replicas }}"
    wait: false
