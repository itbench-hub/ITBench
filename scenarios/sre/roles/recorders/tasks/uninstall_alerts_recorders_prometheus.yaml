---
- name: Retrieve the Prometheus alert recorder StatefulSet
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: StatefulSet
    kubeconfig: "{{ recorders_cluster.kubeconfig }}"
    namespace: "{{ recorders_namespace.name }}"
    name: prometheus-alert-recorder
  register: recorders_prometheus_statefulset_info

- name: Scale down Prometheus alert recorder to stop writes
  kubernetes.core.k8s:
    api_version: apps/v1
    kind: StatefulSet
    kubeconfig: "{{ recorders_cluster.kubeconfig }}"
    name: prometheus-alert-recorder
    namespace: "{{ recorders_namespace.name }}"
    definition:
      spec:
        replicas: 0
    state: patched
  when:
    - recorders_prometheus_statefulset_info.resources | length == 1

- name: Wait for recorder pod to terminate
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Pod
    kubeconfig: "{{ recorders_cluster.kubeconfig }}"
    namespace: "{{ recorders_namespace.name }}"
    label_selectors:
      - app.kubernetes.io/name = prometheus-alert-recorder
      - app.kubernetes.io/part-of = it-bench
  register: recorders_prometheus_pods_check
  until: recorders_prometheus_pods_check.resources | length == 0
  retries: 60
  delay: 5
  when:
    - recorders_prometheus_statefulset_info.resources | length == 1

- name: Ensure local directory exists
  ansible.builtin.file:
    path: /tmp/alerts
    state: directory
    mode: "0755"
  when:
    - recorders_prometheus_statefulset_info.resources | length == 1

- name: Create temporary pod to access PVC
  kubernetes.core.k8s:
    kubeconfig: "{{ recorders_cluster.kubeconfig }}"
    definition:
      apiVersion: v1
      kind: Pod
      metadata:
        name: prometheus-data-exporter
        namespace: "{{ recorders_namespace.name }}"
        labels:
          app.kubernetes.io/name: prometheus-data-exporter
          app.kubernetes.io/part-of: it-bench
      spec:
        restartPolicy: Never
        containers:
          - name: exporter
            image: registry.access.redhat.com/ubi10/python-312:latest
            command: ["sleep", "3600"]
            volumeMounts:
              - name: data
                mountPath: /data
        volumes:
          - name: data
            persistentVolumeClaim:
              claimName: prometheus-alert-records-prometheus-alert-recorder-0
    state: present
    wait: true
    wait_condition:
      type: Ready
      status: "True"
    wait_timeout: 120
  when:
    - recorders_prometheus_statefulset_info.resources | length == 1

- name: Copy records directory from temporary pod
  ansible.builtin.shell: |
    set -o pipefail
    kubectl exec \
      --kubeconfig={{ recorders_cluster.kubeconfig | ansible.builtin.expanduser }} \
      -n {{ recorders_namespace.name }} \
      prometheus-data-exporter \
      -- tar cf - -C /data --exclude='lost+found' . | \
    tar xf - -C /tmp/alerts/
  args:
    executable: /bin/bash
  register: recorders_prometheus_copy_output
  changed_when: recorders_prometheus_copy_output.rc == 0
  when:
    - recorders_prometheus_statefulset_info.resources | length == 1

- name: Delete temporary exporter pod
  kubernetes.core.k8s:
    api_version: v1
    kind: Pod
    kubeconfig: "{{ recorders_cluster.kubeconfig }}"
    name: prometheus-data-exporter
    namespace: "{{ recorders_namespace.name }}"
    state: absent
    wait: true
  when:
    - recorders_prometheus_statefulset_info.resources | length == 1

- name: Uninstall Prometheus Alert Recorder
  kubernetes.core.k8s:
    api_version: apps/v1
    kind: StatefulSet
    kubeconfig: "{{ recorders_cluster.kubeconfig }}"
    name: prometheus-alert-recorder
    namespace: "{{ recorders_namespace.name }}"
    state: absent
    wait: true

- name: Delete ConfigMap with Python script
  kubernetes.core.k8s:
    api_version: v1
    delete_all: true
    kind: ConfigMap
    kubeconfig: "{{ recorders_cluster.kubeconfig }}"
    namespace: "{{ recorders_namespace.name }}"
    label_selectors:
      - app.kubernetes.io/name = prometheus-alert-recorder
      - app.kubernetes.io/part-of = it-bench
    state: absent
    wait: true

- name: Delete Secret with bearer token
  kubernetes.core.k8s:
    api_version: v1
    delete_all: true
    kind: Secret
    kubeconfig: "{{ recorders_cluster.kubeconfig }}"
    namespace: "{{ recorders_namespace.name }}"
    label_selectors:
      - app.kubernetes.io/name = prometheus-alert-recorder
      - app.kubernetes.io/part-of = it-bench
    state: absent
    wait: true
  when:
    - recorders_cluster.platform == "openshift"

- name: Find all exported JSON files
  ansible.builtin.find:
    path: /tmp/alerts
    patterns:
      - "*.json"
  register: recorders_prometheus_files

- name: Ensure alerts directory exists on local
  ansible.builtin.file:
    path: "{{ recorders_storage.local.directory }}/alerts"
    state: directory
    mode: "0755"
  when:
    - recorders_storage.local is defined

- name: Copy exported data into local directory
  ansible.builtin.copy:
    dest: "{{ recorders_storage.local.directory }}/alerts/{{ file.path | basename }}"
    mode: "0644"
    src: "{{ file.path }}"
  loop: "{{ recorders_prometheus_files.files }}"
  loop_control:
    label: file/{{ file.path | basename }}
    loop_var: file
  when:
    - recorders_storage.local is defined
    - recorders_prometheus_files is defined

- name: Upload exported data to S3 bucket
  amazon.aws.s3_object:
    endpoint_url: "{{ recorders_storage.s3.endpoint }}"
    bucket: "{{ recorders_storage.s3.bucket }}"
    object: "{{ recorders_storage.s3.directory }}/alerts/{{ file.path | basename }}"
    src: "{{ file.path }}"
    mode: put
  loop: "{{ recorders_prometheus_files.files }}"
  loop_control:
    label: file/{{ file.path | basename }}
    loop_var: file
  when:
    - recorders_storage.s3 is defined
    - recorders_prometheus_files is defined
