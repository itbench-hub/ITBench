---
- name: Retrieve the unified recorder StatefulSet
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: StatefulSet
    kubeconfig: "{{ recorders_cluster.kubeconfig }}"
    namespace: "{{ recorders_namespace.name }}"
    name: clickhouse-unified-recorder
  register: recorders_clickhouse_statefulset_info

- name: Scale down ClickHouse unified recorder to stop writes
  kubernetes.core.k8s:
    api_version: apps/v1
    kind: StatefulSet
    kubeconfig: "{{ recorders_cluster.kubeconfig }}"
    name: clickhouse-unified-recorder
    namespace: "{{ recorders_namespace.name }}"
    definition:
      spec:
        replicas: 0
    state: patched
  when:
    - recorders_clickhouse_statefulset_info.resources | length == 1

- name: Wait for recorder pod to terminate
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Pod
    kubeconfig: "{{ recorders_cluster.kubeconfig }}"
    namespace: "{{ recorders_namespace.name }}"
    label_selectors:
      - app.kubernetes.io/name = clickhouse-unified-recorder
      - app.kubernetes.io/part-of = it-bench
  register: recorders_clickhouse_pods_check
  until: recorders_clickhouse_pods_check.resources | length == 0
  retries: 60
  delay: 5
  when:
    - recorders_clickhouse_statefulset_info.resources | length == 1

- name: Ensure local directory exists
  ansible.builtin.file:
    path: /tmp/observability_information_from_clickhouse
    state: directory
    mode: "0755"
  when:
    - recorders_clickhouse_statefulset_info.resources | length == 1

- name: Create temporary pod to access PVC
  kubernetes.core.k8s:
    kubeconfig: "{{ recorders_cluster.kubeconfig }}"
    definition:
      apiVersion: v1
      kind: Pod
      metadata:
        name: clickhouse-data-exporter
        namespace: "{{ recorders_namespace.name }}"
        labels:
          app.kubernetes.io/name: clickhouse-data-exporter
          app.kubernetes.io/part-of: it-bench
      spec:
        restartPolicy: Never
        containers:
          - name: exporter
            image: registry.access.redhat.com/ubi9/python-312:latest
            command: ["sleep", "3600"]
            volumeMounts:
              - name: data
                mountPath: /data
        volumes:
          - name: data
            persistentVolumeClaim:
              claimName: clickhouse-unified-records-clickhouse-unified-recorder-0
    state: present
    wait: true
    wait_condition:
      type: Ready
      status: "True"
    wait_timeout: 120
  when:
    - recorders_clickhouse_statefulset_info.resources | length == 1

- name: Copy records directory from temporary pod
  ansible.builtin.shell: |
    set -o pipefail
    kubectl exec \
      --kubeconfig={{ recorders_cluster.kubeconfig | ansible.builtin.expanduser }} \
      -n {{ recorders_namespace.name }} \
      clickhouse-data-exporter \
      -- tar cf - -C /data --exclude='lost+found' . | \
    tar xf - -C /tmp/observability_information_from_clickhouse/
  args:
    executable: /bin/bash
  register: recorders_clickhouse_copy_output
  changed_when: recorders_clickhouse_copy_output.rc == 0
  when:
    - recorders_clickhouse_statefulset_info.resources | length == 1

- name: Delete temporary exporter pod
  kubernetes.core.k8s:
    api_version: v1
    kind: Pod
    kubeconfig: "{{ recorders_cluster.kubeconfig }}"
    name: clickhouse-data-exporter
    namespace: "{{ recorders_namespace.name }}"
    state: absent
    wait: true
  when:
    - recorders_clickhouse_statefulset_info.resources | length == 1

- name: Uninstall ClickHouse unified recorder
  kubernetes.core.k8s:
    api_version: apps/v1
    kind: StatefulSet
    kubeconfig: "{{ recorders_cluster.kubeconfig }}"
    name: clickhouse-unified-recorder
    namespace: "{{ recorders_namespace.name }}"
    state: absent
    wait: true

- name: Delete ConfigMap with Python script
  kubernetes.core.k8s:
    api_version: v1
    delete_all: true
    kind: ConfigMap
    kubeconfig: "{{ recorders_cluster.kubeconfig }}"
    namespace: "{{ recorders_namespace.name }}"
    label_selectors:
      - app.kubernetes.io/name = clickhouse-unified-recorder
      - app.kubernetes.io/part-of = it-bench
    state: absent
    wait: true

- name: Find all exported files
  ansible.builtin.find:
    path: /tmp/observability_information_from_clickhouse
    recurse: true
    patterns:
      - "*.json"
      - "*.tsv"
      - "*.parquet"
  register: recorders_clickhouse_files

- name: Ensure observability_information directory exists on local
  ansible.builtin.file:
    path: "{{ recorders_storage.local.directory }}/observability_information_from_clickhouse"
    state: directory
    mode: "0755"
  when:
    - recorders_storage.local is defined

- name: Copy exported data into local directory
  ansible.builtin.copy:
    dest: >-
      {{ recorders_storage.local.directory }}/observability_information_from_clickhouse/{{
      file.path | regex_replace('^/tmp/observability_information_from_clickhouse/?', '') }}
    mode: "0644"
    src: "{{ file.path }}"
  loop: "{{ recorders_clickhouse_files.files }}"
  loop_control:
    label: file/{{ file.path | basename }}
    loop_var: file
  when:
    - recorders_storage.local is defined
    - recorders_clickhouse_files is defined

- name: Upload exported data to S3 bucket
  amazon.aws.s3_object:
    endpoint_url: "{{ recorders_storage.s3.endpoint }}"
    bucket: "{{ recorders_storage.s3.bucket }}"
    object: >-
      {{ recorders_storage.s3.directory }}/observability_information_from_clickhouse/{{
      file.path | regex_replace('^/tmp/observability_information_from_clickhouse/?', '') }}
    src: "{{ file.path }}"
    mode: put
  loop: "{{ recorders_clickhouse_files.files }}"
  loop_control:
    label: file/{{ file.path | basename }}
    loop_var: file
  when:
    - recorders_storage.s3 is defined
    - recorders_clickhouse_files is defined
