name: Run ITBench Unit Tests

on:
  pull_request:
    branches:
      - main
    paths:
      - clusters/kind/go.*
      - clusters/kind/playbooks/roles/containers/**
      - scenarios/sre/project/roles/agent/**
      - scenarios/sre/project/roles/awx/**
      - scenarios/sre/project/roles/faults/**
      - scenarios/sre/project/roles/recorders/**
      - scenarios/sre/project/roles/tools/**
      - scenarios/sre/project/roles/waiters/**

concurrency:
  group: ci-unit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  clusters-kind:
    name: ITBench Clusters Kind Tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: astral-sh/setup-uv@v8.0.0
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: clusters/kind/go.mod
          cache-dependency-path: clusters/kind/go.sum
      - name: Install project dependencies
        run: |
          make deps
      - name: Create Kind cluster
        run: |
          make -C clusters/kind create-simple-cluster
      - name: Run Cloud Provider
        run: |
          make -C clusters/kind run-service-provider &
          sleep 10
      - name: Run unit tests
        run: |
          make -C clusters/kind test-unit-containers
      - name: Destroy Kind cluster
        run: |
          make -C clusters/kind destroy-simple-cluster
  environment-recorders:
    name: ITBench Environment Recorders Tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: astral-sh/setup-uv@v8.1.0
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: clusters/kind/go.mod
          cache-dependency-path: clusters/kind/go.sum
      - name: Install project dependencies
        run: |
          make deps
      - name: Create group vars
        run: |
          make -C scenarios/sre group-vars
      - name: Create Kind cluster
