name: Run ITBench Network Tests

on:
  pull_request:
    branches:
      - main
    paths:
      - clusters/kind/go.*
      - clusters/kind/playbooks/roles/containers/**
      - scenarios/sre/project/roles/tools/**

concurrency:
  group: ci-network-${{ github.ref }}
  cancel-in-progress: true

jobs:
  environment-tools-gateway:
    name: ITBench Environment Tools Gateway Network Tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: astral-sh/setup-uv@v8.1.0
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: clusters/kind/go.mod
          cache-dependency-path: clusters/kind/go.sum
      - uses: azure/setup-helm@v5.0.0
        with:
          version: v3.19.0
      - name: Install project dependencies
        run: |
          make deps
      - name: Create group vars
        run: |
          make -C scenarios/sre group-vars
      - name: Create Kind cluster
        run: |
          make -C clusters/kind create-simple-cluster
      - name: Run Cloud Provider
        run: |
          make -C clusters/kind run-service-provider &
          sleep 10
      - name: Install all tools connected to Kubernetes Gateway
        run: |
          make -C scenarios/sre deploy-tools
      - name: Run connection tests
        run: |
          make -C scenarios/sre test-network-gateway
      - name: Uninstall tools
        run: |
          make -C scenarios/sre undeploy-tools
      - name: Destroy Kind cluster
        run: |
          make -C clusters/kind destroy-simple-cluster
