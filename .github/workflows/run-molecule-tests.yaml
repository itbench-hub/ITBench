name: Run ITBench Molecule Tests

on:
  pull_request:
    branches:
      - main
    paths:
      - clusters/kind/go.*
      - clusters/kind/playbooks/roles/containers/**
      - scenarios/sre/project/roles/agent/**
      - scenarios/sre/project/roles/applications/**
      - scenarios/sre/project/roles/awx/**
      - scenarios/sre/project/roles/faults/**
      - scenarios/sre/project/roles/recorders/**
      - scenarios/sre/project/roles/tools/**
      - scenarios/sre/project/roles/waiters/**
      - '!scenarios/sre/project/roles/awx/tasks/generate_files.yaml'
      - '!scenarios/sre/project/roles/faults/tasks/generate_files.yaml'
      - '!scenarios/sre/project/roles/waiters/tasks/generate_files.yaml'

concurrency:
  group: ci-molecule-${{ github.ref }}
  cancel-in-progress: true

jobs:
  environment-applications:
    name: ITBench Environment Applications Tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: astral-sh/setup-uv@v8.3.0
      - uses: actions/setup-go@v6.5.0
        with:
          go-version-file: clusters/kind/go.mod
          cache-dependency-path: clusters/kind/go.sum
      - name: Install project dependencies
        run: |
          make deps
      - name: Create group vars
        run: |
          make -C scenarios/sre group-vars
      - name: Create Kind cluster
        run: |
          make -C clusters/kind create-simple-cluster
      - name: Run Cloud Provider
        run: |
          make -C clusters/kind run-service-provider &
          sleep 10
      - name: Run Molecule tests
        run: |
          make -C scenarios/sre test-molecule-applications
      - name: Destroy Kind cluster
        run: |
          make -C clusters/kind destroy-simple-cluster
  environment-recorders:
    name: ITBench Environment Recorders Tests
