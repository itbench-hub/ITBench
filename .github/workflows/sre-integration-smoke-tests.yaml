name: Perform integration smoke tests for SRE scenarios

on:
  pull_request:
    branches:
      - main
    paths:
      - clusters/kind/go.*
      - scenarios/sre/project/manage_applications.yaml
      - scenarios/sre/project/manage_faults.yaml
      - scenarios/sre/project/roles/**
      - '!scenarios/sre/project/roles/agent/**'
      - '!scenarios/sre/project/roles/awx/**'
      - '!scenarios/sre/project/roles/documentation/**'
      - '!scenarios/sre/project/roles/recorders/**'
      - '!scenarios/sre/project/roles/tools/**'
      - '!scenarios/sre/project/roles/waiters/**'

concurrency:
  group: ci-integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sre-scenario-60:
    name: SRE Scenario 60 Smoke Test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: astral-sh/setup-uv@v8.1.0
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: clusters/kind/go.mod
          cache-dependency-path: clusters/kind/go.sum
      - uses: azure/setup-helm@v5.0.0
        with:
          version: v4.1.4
      - name: Create Kind cluster
        run: |
          make -C clusters/kind create-simple-cluster
      - name: Run Cloud Provider
        run: |
          make -C clusters/kind run-service-provider &
          sleep 10
      - name: Install project dependencies
        run: |
          make deps
      - name: Create group vars
        run: |
          make -C scenarios/sre group-vars
      - name: Create environment
        run: |
          SCENARIO_NUMBER=60 make -C scenarios/sre create-environment
      - name: Test fault injection
        run: |
          SCENARIO_NUMBER=60 make -C scenarios/sre inject-scenario-faults
      - name: Test fault removal
        run: |
          SCENARIO_NUMBER=60 make -C scenarios/sre remove-fault-resources
      - name: Destroy environment
        run: |
          SCENARIO_NUMBER=60 make -C scenarios/sre destroy-environment
