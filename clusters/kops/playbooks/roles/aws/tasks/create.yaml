---
# NOTE: `batch` is used here because using Python's slice operator
#       causes the linter to error out.

- name: Extract CIDR address base
  ansible.builtin.set_fact:
    aws_vpc_cidr_base: |-
      {{
        aws_configuration.networking.vpc.cidr |
        ansible.builtin.split(".") |
        ansible.builtin.batch(2) |
        ansible.builtin.first |
        ansible.builtin.join(".")
      }}

- name: Create VPC
  amazon.aws.ec2_vpc_net:
    cidr_block: "{{ aws_configuration.networking.vpc.cidr }}"
    name: "{{ aws_cluster_group.name.prefix }}-vpc"
    region: "{{ aws_configuration.region }}"
    state: present
    tags:
      ClusterGroup: "{{ aws_cluster_group.name.prefix }}"
      ManagedBy: ansible
      Name: "{{ aws_cluster_group.name.prefix }}-vpc"
  register: aws_vpc

- name: Create VPC Internet Gateway
  amazon.aws.ec2_vpc_igw:
    region: "{{ aws_configuration.region }}"
    state: present
    tags:
      ClusterGroup: "{{ aws_cluster_group.name.prefix }}"
      ManagedBy: ansible
      Name: "{{ aws_cluster_group.name.prefix }}-igw-gateway"
    vpc_id: "{{ aws_vpc.vpc.id }}"
  register: aws_igw

- name: Create VPC subnet(s)
  amazon.aws.ec2_vpc_subnet:
    az: "{{ aws_configuration.zones | ansible.builtin.first }}"
    cidr: "{{ aws_vpc_cidr_base }}.{{ subnet_config[0] }}.0/24"
    map_public: "{{ subnet_config[1] }}"
    region: "{{ aws_configuration.region }}"
    state: present
    tags:
      ClusterGroup: "{{ aws_cluster_group.name.prefix }}"
      ManagedBy: ansible
      Name: "{{ aws_cluster_group.name.prefix }}-public-subnet-{{ subnet_config[0] | string }}"
    vpc_id: "{{ aws_vpc.vpc.id }}"
    wait: true
  loop: |-
    {{
      (
        range(
          1,
          aws_configuration.vpc.subnets.count + 1
        ) |
        ansible.builtin.list |
        product([true])
      ) +
      (
        range(
          aws_configuration.vpc.subnets.count + 1,
          (aws_configuration.vpc.subnets.count * 2) + 1
        ) |
        ansible.builtin.list |
        product([false])
      )
    }}
  loop_control:
    label: subnet/{{ subnet_config[0] }}
    loop_var: subnet_config
  register: aws_vpc_subnets

- name: Create subnet id lists by public availability
  ansible.builtin.set_fact:
    aws_vpc_subnet_ids:
      private: |-
        {{
          aws_public_vpc_subnets.results |
          ansible.builtin.selectattr("subnet.map_public_ip_on_launch", "==", false) |
          map(attribute='subnet.id')
        }}
      public: |-
        {{
          aws_public_vpc_subnets.results |
          ansible.builtin.selectattr("subnet.map_public_ip_on_launch", "==", true) |
          map(attribute='subnet.id')
        }}

- name: Verify that all subnets were created
  ansible.builtin.assert:
    that:
      - (aws_vpc_subnet_ids.public | ansible.builtin.length) == aws_configuration.vpc.subnets.count
      - (aws_vpc_subnet_ids.public | ansible.builtin.length) == (aws_vpc_subnet_ids.private | ansible.builtin.length)
    fail_msg: All subnets were not created. Please retry.
    success_msg: All subnets were created.

- name: Create VPC route table for public subnets
  amazon.aws.ec2_vpc_route_table:
    region: "{{ aws_configuration.region }}"
    routes:
      - dest: "0.0.0.0/0"
        gateway_id: "{{ aws_igw.gateway_id }}"
    state: present
    subnets: "{{ aws_vpc_subnet_ids.public }}"
    tags:
      ClusterGroup: "{{ aws_cluster_group.name.prefix }}"
      ManagedBy: ansible
      Name: "{{ aws_cluster_group.name.prefix }}-public-route-table"
    vpc_id: "{{ aws_vpc.vpc.id }}"

- name: Configure NAT Gateway with private subnets
  when:
    - aws_configuration.vpc.nat_gateway is defined
  block:
    - name: Create VPC NAT Gateway
      amazon.aws.ec2_vpc_nat_gateway:
        allocation_id: "{{ aws_configuration.vpc.nat_gateway.elastic_ip_allocation_id }}"
        region: "{{ aws_configuration.region }}"
        state: present
        subnet_id: "{{ aws_public_vpc_subnets.results[0].subnet.id }}"
        tags:
          ClusterGroup: "{{ aws_cluster_group.name.prefix }}"
          ManagedBy: ansible
          Name: "{{ aws_cluster_group.name.prefix }}-nat-gateway"
        wait: true
      register: aws_nat_gateway

    - name: Create VPC route table for private subnets
      amazon.aws.ec2_vpc_route_table:
        region: "{{ aws_configuration.region }}"
        routes:
          - dest: "0.0.0.0/0"
            nat_gateway_id: "{{ aws_nat_gateway.nat_gateway_id }}"
        state: present
        subnets: "{{ aws_vpc_subnet_ids.private }}"
        tags:
          ClusterGroup: "{{ aws_cluster_group.name.prefix }}"
          ManagedBy: ansible
          Name: "{{ aws_cluster_group.name.prefix }}-nat-private-route-table"
        vpc_id: "{{ aws_vpc.vpc.id }}"

- name: Configure Route Table with Internet Gateway
  when:
    - aws_configuration.vpc.nat_gateway is undefined
  block:
    - name: Create VPC route table for private subnets
      amazon.aws.ec2_vpc_route_table:
        region: "{{ aws_configuration.region }}"
        routes:
          - dest: "0.0.0.0/0"
            gateway_id: "{{ aws_igw.gateway_id }}"
        state: present
        subnets: "{{ aws_vpc_subnet_ids.private }}"
        tags:
          ClusterGroup: "{{ aws_cluster_group.name.prefix }}"
          ManagedBy: ansible
          Name: "{{ aws_cluster_group.name.prefix }}-igw-private-route-table"
        vpc_id: "{{ aws_vpc.vpc.id }}"
