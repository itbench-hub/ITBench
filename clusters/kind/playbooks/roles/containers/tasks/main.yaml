---
- name: Import validation tasks
  ansible.builtin.import_tasks:
    file: validate_runtime.yaml

- name: List docker containers
  when:
    - containers_docker_path is defined
  block:
    - name: Retrieve cloud provider kind containers from Docker
      ansible.builtin.command:
        argv:
          - "{{ containers_docker_path }}"
          - ps
          - --filter
          - name=^kindccm
          - --format
          - json
      register: containers_docker_ps
      changed_when:
        - false

    - name: Parse cloud provider kind ids by service
      ansible.builtin.set_fact:
        containers_docker_cpk_containers: |-
          {{
            (
              containers_docker_cpk_containers |
              ansible.builtin.default({})
            ) |
            ansible.builtin.combine(
              {
                load_balancer_label_components[1]: {
                  load_balancer_label_components[2]: {
                    "container": {
                      "id": container.ID
                    }
                  }
                }
              },
              recursive=true
            )
          }}
      loop: |-
        {{
          containers_docker_ps.stdout_lines |
          map("ansible.builtin.from_json")
        }}
      loop_control:
        label: container/{{ container.ID }}
        loop_var: container
      vars:
        load_balancer_label_components: |-
          {{
            (
              dict(
                container.Labels |
                ansible.builtin.split(",") |
                map("ansible.builtin.split", "=")
              )["io.x-k8s.cloud-provider-kind.loadbalancer.name"]
            ) |
            ansible.builtin.split("/")
          }}

    - debug:
        var: containers_docker_cpk_containers

- name: List podman containers
  when:
    - containers_podman_path is defined
  block:
    - name: Retrieve cloud provider kind containers from podman
      ansible.builtin.command:
        argv:
          - "{{ containers_podman_path }}"
          - ps
          - --filter
          - name=^kindccm
          - --format
          - json
      register: containers_podman_ps
      changed_when:
        - false

    - name: Parse cloud provider kind ids by service
      ansible.builtin.set_fact:
        containers_podman_cpk_containers: |-
          {{
            (
              containers_podman_cpk_containers |
              ansible.builtin.default({})
            ) |
            ansible.builtin.combine(
              {
                load_balancer_label_components[1]: {
                  load_balancer_label_components[2]: {
                    "container": {
                      "hostPort": load_balancer_service_port.host_port
                    }
                  }
                }
              },
              recursive=true
            )
          }}
      loop: "{{ containers_podman_ps.stdout | ansible.builtin.from_json }}"
      loop_control:
        label: container/{{ container.ID }}
        loop_var: container
      vars:
        load_balancer_service_port: |-
          {{
            container.Ports |
            ansible.builtin.selectattr("container_port", "==", 80) |
            ansible.builtin.first
          }}
        load_balancer_label_components: |-
          {{
            container.Labels["io.x-k8s.cloud-provider-kind.loadbalancer.name"] |
            ansible.builtin.split("/")
          }}

    - debug:
        var: containers_podman_cpk_containers
